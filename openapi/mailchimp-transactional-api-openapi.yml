components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-MC-ApiKey
      description: >-
        Mandrill uses API key authentication. The key is passed in the
        JSON request body as the "key" parameter for every call, or
        alternatively via the X-MC-ApiKey header.

  responses:
    ValidationError:
      description: The request parameters were invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InvalidKeyError:
      description: The provided API key is not valid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    GeneralError:
      description: An unexpected error occurred on the server.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      description: A standard error response from the Mandrill API.
      properties:
        status:
          type: string
          enum:
            - error
          description: Always "error" for error responses.
        code:
          type: integer
          description: The numeric error code.
        name:
          type: string
          description: The name/type of the error (e.g., Invalid_Key, ValidationError).
        message:
          type: string
          description: A human-readable description of the error.

    MessagePayload:
      type: object
      description: >-
        The message object containing all parameters for a transactional
        email, including recipients, content, attachments, and tracking
        options.
      properties:
        html:
          type: string
          description: The full HTML content of the message.
        text:
          type: string
          description: The full plain-text content of the message.
        subject:
          type: string
          description: The message subject line.
        from_email:
          type: string
          format: email
          description: The sender email address.
        from_name:
          type: string
          description: The sender display name.
        to:
          type: array
          description: An array of recipient objects.
          items:
            type: object
            required:
              - email
            properties:
              email:
                type: string
                format: email
                description: The recipient email address.
              name:
                type: string
                description: The recipient display name.
              type:
                type: string
                enum:
                  - to
                  - cc
                  - bcc
                default: to
                description: The recipient type (to, cc, or bcc).
        headers:
          type: object
          additionalProperties:
            type: string
          description: Optional extra headers to add to the message (e.g., Reply-To).
        important:
          type: boolean
          default: false
          description: Whether this message is important and should be delivered ahead of non-important messages.
        track_opens:
          type: boolean
          description: Whether to enable open tracking for this message.
        track_clicks:
          type: boolean
          description: Whether to enable click tracking for this message.
        auto_text:
          type: boolean
          description: >-
            Whether to automatically generate a plain-text version from
            the HTML content.
        auto_html:
          type: boolean
          description: >-
            Whether to automatically generate HTML from the plain-text
            content.
        inline_css:
          type: boolean
          description: >-
            Whether to automatically inline all CSS styles from style
            blocks in the HTML content.
        url_strip_qs:
          type: boolean
          description: Whether to strip query strings from URLs when aggregating tracked click data.
        preserve_recipients:
          type: boolean
          description: Whether to show all recipients in the To header of each email.
        view_content_link:
          type: boolean
          description: Whether to include a View Content Link in the Mandrill dashboard for this message.
        bcc_address:
          type: string
          format: email
          description: An optional address to BCC on the message.
        tracking_domain:
          type: string
          description: A custom domain to use for tracking opens and clicks.
        signing_domain:
          type: string
          description: A custom domain to use for DKIM signing instead of the default.
        return_path_domain:
          type: string
          description: A custom domain to use for the return-path header.
        merge:
          type: boolean
          default: true
          description: Whether to evaluate merge tags in the message.
        merge_language:
          type: string
          enum:
            - mailchimp
            - handlebars
          default: mailchimp
          description: The merge tag language to use (Mailchimp or Handlebars).
        global_merge_vars:
          type: array
          description: Global merge variables applied to all recipients.
          items:
            type: object
            properties:
              name:
                type: string
                description: The global merge variable name.
              content:
                type: string
                description: The global merge variable value.
        merge_vars:
          type: array
          description: Per-recipient merge variables.
          items:
            type: object
            properties:
              rcpt:
                type: string
                format: email
                description: The recipient email address.
              vars:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      description: The merge variable name.
                    content:
                      type: string
                      description: The merge variable value.
        tags:
          type: array
          items:
            type: string
          description: An array of string tags to apply to this message for analytics.
        subaccount:
          type: string
          description: The unique ID of a subaccount for this message.
        google_analytics_domains:
          type: array
          items:
            type: string
          description: An array of domains for which Google Analytics tracking parameters will be appended.
        google_analytics_campaign:
          type: string
          description: The utm_campaign tracking parameter for Google Analytics.
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Key-value metadata to associate with the message.
        recipient_metadata:
          type: array
          description: Per-recipient metadata.
          items:
            type: object
            properties:
              rcpt:
                type: string
                format: email
                description: The recipient email address.
              values:
                type: object
                additionalProperties:
                  type: string
                description: Key-value metadata for this recipient.
        attachments:
          type: array
          description: An array of file attachments.
          items:
            type: object
            properties:
              type:
                type: string
                description: The MIME type of the attachment.
              name:
                type: string
                description: The file name of the attachment.
              content:
                type: string
                description: Base64-encoded content of the attachment.
        images:
          type: array
          description: An array of inline images referenced with "cid:" in the HTML content.
          items:
            type: object
            properties:
              type:
                type: string
                description: The MIME type of the image (e.g., image/png).
              name:
                type: string
                description: The Content-ID of the image, referenced as "cid:name" in HTML.
              content:
                type: string
                description: Base64-encoded content of the image.

    SendResult:
      type: object
      description: The result of sending a message to a single recipient.
      properties:
        email:
          type: string
          format: email
          description: The recipient email address.
        status:
          type: string
          enum:
            - sent
            - queued
            - scheduled
            - rejected
            - invalid
          description: The sending status for this recipient.
        reject_reason:
          type: string
          enum:
            - hard-bounce
            - soft-bounce
            - spam
            - unsub
            - custom
            - invalid-sender
            - invalid
            - test-mode-limit
            - unsigned
            - rule
          description: The reason the message was rejected, if applicable.
        queued_reason:
          type: string
          description: The reason the message was queued instead of sent immediately.
        _id:
          type: string
          description: The unique message ID for this recipient's message.

    MessageInfo:
      type: object
      description: Summary information about a sent message.
      properties:
        ts:
          type: integer
          description: The Unix timestamp when the message was sent.
        _id:
          type: string
          description: The unique message ID.
        sender:
          type: string
          format: email
          description: The sender email address.
        template:
          type: string
          description: The template slug used, if any.
        subject:
          type: string
          description: The subject line of the message.
        email:
          type: string
          format: email
          description: The recipient email address.
        tags:
          type: array
          items:
            type: string
          description: Tags applied to the message.
        opens:
          type: integer
          description: The number of times the message was opened.
        opens_detail:
          type: array
          items:
            type: object
            properties:
              ts:
                type: integer
                description: Unix timestamp of the open event.
              ip:
                type: string
                description: IP address from which the message was opened.
              location:
                type: string
                description: Approximate geographic location of the open.
              ua:
                type: string
                description: User agent string of the client.
          description: Detailed open tracking events.
        clicks:
          type: integer
          description: The number of link clicks in the message.
        clicks_detail:
          type: array
          items:
            type: object
            properties:
              ts:
                type: integer
                description: Unix timestamp of the click event.
              url:
                type: string
                description: The URL that was clicked.
              ip:
                type: string
                description: IP address of the clicker.
              location:
                type: string
                description: Approximate geographic location of the click.
              ua:
                type: string
                description: User agent string of the client.
          description: Detailed click tracking events.
        state:
          type: string
          enum:
            - sent
            - bounced
            - rejected
            - soft-bounced
            - spam
            - unsub
          description: The current state of the message.
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Custom metadata attached to the message.

    MessageDetail:
      type: object
      description: Detailed information about a specific message.
      allOf:
        - $ref: '#/components/schemas/MessageInfo'
        - type: object
          properties:
            smtp_events:
              type: array
              description: SMTP event log for the message delivery.
              items:
                type: object
                properties:
                  ts:
                    type: integer
                    description: Unix timestamp of the SMTP event.
                  type:
                    type: string
                    description: The type of SMTP event.
                  diag:
                    type: string
                    description: Diagnostic information from the receiving server.
            resends:
              type: array
              description: A list of resend attempts for this message.
              items:
                type: object
                properties:
                  ts:
                    type: integer
                    description: Unix timestamp of the resend.

    MessageContent:
      type: object
      description: The full content of a sent message.
      properties:
        ts:
          type: integer
          description: Unix timestamp of when the message was sent.
        _id:
          type: string
          description: The unique message ID.
        from_email:
          type: string
          format: email
          description: The sender email address.
        from_name:
          type: string
          description: The sender display name.
        subject:
          type: string
          description: The message subject line.
        to:
          type: object
          properties:
            email:
              type: string
              format: email
              description: Recipient email address.
            name:
              type: string
              description: Recipient display name.
          description: The primary recipient.
        tags:
          type: array
          items:
            type: string
          description: Tags applied to the message.
        headers:
          type: object
          additionalProperties:
            type: string
          description: The full message headers.
        text:
          type: string
          description: The plain-text body of the message.
        html:
          type: string
          description: The HTML body of the message.
        attachments:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                description: The attachment file name.
              type:
                type: string
                description: The MIME type of the attachment.
              content:
                type: string
                description: Base64-encoded attachment content.
          description: File attachments included in the message.

    ParsedMessage:
      type: object
      description: A parsed MIME message.
      properties:
        subject:
          type: string
          description: The parsed subject line.
        from_email:
          type: string
          format: email
          description: The parsed sender email address.
        from_name:
          type: string
          description: The parsed sender name.
        to:
          type: array
          items:
            type: object
            properties:
              email:
                type: string
                format: email
              name:
                type: string
          description: Parsed recipient list.
        headers:
          type: object
          additionalProperties:
            type: string
          description: All parsed headers.
        text:
          type: string
          description: The plain-text body.
        html:
          type: string
          description: The HTML body.
        attachments:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              type:
                type: string
              content:
                type: string
          description: Parsed file attachments.
        images:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              type:
                type: string
              content:
                type: string
          description: Parsed inline images.

    ScheduledMessage:
      type: object
      description: A message scheduled for future delivery.
      properties:
        _id:
          type: string
          description: The unique scheduled message ID.
        created_at:
          type: string
          format: date-time
          description: When the scheduled message was created.
        send_at:
          type: string
          format: date-time
          description: When the message is scheduled to be sent.
        from_email:
          type: string
          format: email
          description: The sender email address.
        to:
          type: string
          format: email
          description: The recipient email address.
        subject:
          type: string
          description: The message subject line.

    TemplateInfo:
      type: object
      description: Information about a Mandrill template.
      properties:
        slug:
          type: string
          description: The URL-safe slug for the template.
        name:
          type: string
          description: The display name of the template.
        labels:
          type: array
          items:
            type: string
          description: Labels applied to the template for organization.
        code:
          type: string
          description: The HTML code of the template.
        subject:
          type: string
          description: The default subject line.
        from_email:
          type: string
          format: email
          description: The default from address.
        from_name:
          type: string
          description: The default from name.
        text:
          type: string
          description: The default text content.
        publish_name:
          type: string
          description: The name of the published version.
        publish_code:
          type: string
          description: The HTML code of the published version.
        publish_subject:
          type: string
          description: The subject of the published version.
        publish_from_email:
          type: string
          format: email
          description: The from address of the published version.
        publish_from_name:
          type: string
          description: The from name of the published version.
        publish_text:
          type: string
          description: The text content of the published version.
        published_at:
          type: string
          format: date-time
          description: When the template was last published.
        created_at:
          type: string
          format: date-time
          description: When the template was created.
        updated_at:
          type: string
          format: date-time
          description: When the template was last updated.

    TagInfo:
      type: object
      description: Information and statistics for a message tag.
      properties:
        tag:
          type: string
          description: The tag name.
        reputation:
          type: integer
          description: The reputation score for the tag (0-100).
        sent:
          type: integer
          description: Total number of messages sent with this tag.
        hard_bounces:
          type: integer
          description: Total hard bounces for messages with this tag.
        soft_bounces:
          type: integer
          description: Total soft bounces for messages with this tag.
        rejects:
          type: integer
          description: Total rejects for messages with this tag.
        complaints:
          type: integer
          description: Total spam complaints for messages with this tag.
        unsubs:
          type: integer
          description: Total unsubscribes for messages with this tag.
        opens:
          type: integer
          description: Total opens for messages with this tag.
        clicks:
          type: integer
          description: Total clicks for messages with this tag.
        unique_opens:
          type: integer
          description: Unique opens for messages with this tag.
        unique_clicks:
          type: integer
          description: Unique clicks for messages with this tag.

    SenderInfo:
      type: object
      description: Information and statistics for a sender address.
      properties:
        address:
          type: string
          format: email
          description: The sender email address.
        created_at:
          type: string
          format: date-time
          description: When the sender was first used.
        sent:
          type: integer
          description: Total number of messages sent from this address.
        hard_bounces:
          type: integer
          description: Total hard bounces.
        soft_bounces:
          type: integer
          description: Total soft bounces.
        rejects:
          type: integer
          description: Total rejects.
        complaints:
          type: integer
          description: Total spam complaints.
        unsubs:
          type: integer
          description: Total unsubscribes.
        opens:
          type: integer
          description: Total opens.
        clicks:
          type: integer
          description: Total clicks.
        unique_opens:
          type: integer
          description: Unique opens.
        unique_clicks:
          type: integer
          description: Unique clicks.

    SenderDomain:
      type: object
      description: Information about a configured sender domain.
      properties:
        domain:
          type: string
          description: The domain name.
        created_at:
          type: string
          format: date-time
          description: When the domain was added.
        last_tested_at:
          type: string
          format: date-time
          description: When the domain settings were last tested.
        spf:
          type: object
          description: SPF verification details.
          properties:
            valid:
              type: boolean
              description: Whether the SPF record is valid.
            valid_after:
              type: string
              format: date-time
              description: When the SPF record was verified.
            error:
              type: string
              description: Any SPF verification error.
        dkim:
          type: object
          description: DKIM verification details.
          properties:
            valid:
              type: boolean
              description: Whether the DKIM record is valid.
            valid_after:
              type: string
              format: date-time
              description: When the DKIM record was verified.
            error:
              type: string
              description: Any DKIM verification error.
        verified_at:
          type: string
          format: date-time
          description: When the domain ownership was verified.
        valid_signing:
          type: boolean
          description: Whether the domain can be used for DKIM signing.

    TimeSeries:
      type: object
      description: An hourly time series data point with sending statistics.
      properties:
        time:
          type: string
          format: date-time
          description: The hour this data point covers (UTC).
        sent:
          type: integer
          description: Number of messages sent.
        hard_bounces:
          type: integer
          description: Number of hard bounces.
        soft_bounces:
          type: integer
          description: Number of soft bounces.
        rejects:
          type: integer
          description: Number of rejects.
        complaints:
          type: integer
          description: Number of spam complaints.
        unsubs:
          type: integer
          description: Number of unsubscribes.
        opens:
          type: integer
          description: Number of opens.
        unique_opens:
          type: integer
          description: Number of unique opens.
        clicks:
          type: integer
          description: Number of clicks.
        unique_clicks:
          type: integer
          description: Number of unique clicks.

    UserInfo:
      type: object
      description: Account-level information for the authenticated Mandrill user.
      properties:
        username:
          type: string
          description: The account username.
        created_at:
          type: string
          format: date-time
          description: When the account was created.
        public_id:
          type: string
          description: A unique public identifier for the account.
        reputation:
          type: integer
          description: The account sending reputation (0-100).
        hourly_quota:
          type: integer
          description: The hourly email sending quota.
        backlog:
          type: integer
          description: The number of messages in the send queue.
        stats:
          type: object
          description: Account-level sending statistics.
          properties:
            today:
              $ref: '#/components/schemas/AccountStats'
            last_7_days:
              $ref: '#/components/schemas/AccountStats'
            last_30_days:
              $ref: '#/components/schemas/AccountStats'
            last_60_days:
              $ref: '#/components/schemas/AccountStats'
            last_90_days:
              $ref: '#/components/schemas/AccountStats'
            all_time:
              $ref: '#/components/schemas/AccountStats'

    AccountStats:
      type: object
      description: Aggregate sending statistics for a time period.
      properties:
        sent:
          type: integer
          description: Total messages sent.
        hard_bounces:
          type: integer
          description: Total hard bounces.
        soft_bounces:
          type: integer
          description: Total soft bounces.
        rejects:
          type: integer
          description: Total rejections.
        complaints:
          type: integer
          description: Total spam complaints.
        unsubs:
          type: integer
          description: Total unsubscribes.
        opens:
          type: integer
          description: Total opens.
        unique_opens:
          type: integer
          description: Unique opens.
        clicks:
          type: integer
          description: Total clicks.
        unique_clicks:
          type: integer
          description: Unique clicks.

    WebhookInfo:
      type: object
      description: Information about a configured webhook.
      properties:
        id:
          type: integer
          description: The unique webhook identifier.
        url:
          type: string
          format: uri
          description: The webhook URL.
        description:
          type: string
          description: A description of the webhook.
        auth_key:
          type: string
          description: >-
            The key used to generate webhook signatures for verifying
            webhook authenticity.
        events:
          type: array
          items:
            type: string
            enum:
              - send
              - hard_bounce
              - soft_bounce
              - open
              - click
              - spam
              - unsub
              - reject
              - deferral
          description: The events that trigger this webhook.
        created_at:
          type: string
          format: date-time
          description: When the webhook was created.
        last_sent_at:
          type: string
          format: date-time
          description: When the webhook last fired.
        batches_sent:
          type: integer
          description: Total number of event batches sent.
        events_sent:
          type: integer
          description: Total number of events sent.
        last_error:
          type: string
          description: The last error received from the webhook URL.

    SubaccountInfo:
      type: object
      description: Information about a subaccount.
      properties:
        id:
          type: string
          description: The unique subaccount identifier.
        name:
          type: string
          description: The display name of the subaccount.
        notes:
          type: string
          description: Notes about the subaccount.
        custom_quota:
          type: integer
          description: The manual hourly quota, if set.
        status:
          type: string
          enum:
            - active
            - paused
          description: The current status of the subaccount.
        reputation:
          type: integer
          description: The subaccount sending reputation (0-100).
        created_at:
          type: string
          format: date-time
          description: When the subaccount was created.
        first_sent_at:
          type: string
          format: date-time
          description: When the subaccount first sent a message.
        sent_weekly:
          type: integer
          description: Messages sent in the last week.
        sent_monthly:
          type: integer
          description: Messages sent in the last month.
        sent_total:
          type: integer
          description: Total messages sent.

    RejectEntry:
      type: object
      description: An entry in the rejection blacklist.
      properties:
        email:
          type: string
          format: email
          description: The rejected email address.
        reason:
          type: string
          enum:
            - hard-bounce
            - soft-bounce
            - spam
            - unsub
            - custom
          description: The reason the address is on the blacklist.
        detail:
          type: string
          description: Extended details about the rejection.
        created_at:
          type: string
          format: date-time
          description: When the entry was added to the blacklist.
        last_event_at:
          type: string
          format: date-time
          description: When the last event occurred for this address.
        expires_at:
          type: string
          format: date-time
          description: When the rejection expires (if applicable).
        expired:
          type: boolean
          description: Whether the rejection has expired.
        subaccount:
          type: string
          description: The subaccount this rejection applies to, if any.
        sender:
          type: object
          properties:
            address:
              type: string
              format: email
            created_at:
              type: string
              format: date-time
            sent:
              type: integer
            hard_bounces:
              type: integer
            soft_bounces:
              type: integer
            rejects:
              type: integer
            complaints:
              type: integer
            unsubs:
              type: integer
            opens:
              type: integer
            clicks:
              type: integer
          description: Sender statistics associated with the rejection.

    AllowlistEntry:
      type: object
      description: An entry in the sending allowlist.
      properties:
        email:
          type: string
          format: email
          description: The allowlisted email address.
        detail:
          type: string
          description: Details or comment about why the address is allowlisted.
        created_at:
          type: string
          format: date-time
          description: When the entry was added to the allowlist.

    DedicatedIP:
      type: object
      description: Information about a dedicated IP address.
      properties:
        ip:
          type: string
          description: The dedicated IP address.
        created_at:
          type: string
          format: date-time
          description: When the IP was provisioned.
        pool:
          type: string
          description: The IP pool this address belongs to.
        domain:
          type: string
          description: The reverse DNS domain for the IP.
        custom_dns:
          type: object
          properties:
            enabled:
              type: boolean
              description: Whether custom reverse DNS is enabled.
            valid:
              type: boolean
              description: Whether the custom DNS is valid.
            error:
              type: string
              description: Any DNS error.
          description: Custom DNS settings for the IP.
        warmup:
          type: object
          properties:
            warming_up:
              type: boolean
              description: Whether the IP is currently in warmup mode.
            start_at:
              type: string
              format: date-time
              description: When the warmup started.
            end_at:
              type: string
              format: date-time
              description: When the warmup is expected to end.
          description: IP warmup status.

    IPPool:
      type: object
      description: An IP pool grouping dedicated IPs.
      properties:
        name:
          type: string
          description: The pool name.
        created_at:
          type: string
          format: date-time
          description: When the pool was created.
        ips:
          type: array
          items:
            $ref: '#/components/schemas/DedicatedIP'
          description: The dedicated IPs in this pool.

    ExportJob:
      type: object
      description: Information about a data export job.
      properties:
        id:
          type: string
          description: The unique export job ID.
        created_at:
          type: string
          format: date-time
          description: When the export was created.
        type:
          type: string
          enum:
            - activity
            - reject
            - whitelist
          description: The type of data being exported.
        finished_at:
          type: string
          format: date-time
          description: When the export completed.
        state:
          type: string
          enum:
            - waiting
            - working
            - complete
            - error
            - expired
          description: The current state of the export.
        result_url:
          type: string
          format: uri
          description: The URL to download the export file (when complete).

    MetadataField:
      type: object
      description: A custom metadata field definition.
      properties:
        name:
          type: string
          description: The unique name of the metadata field.
        state:
          type: string
          enum:
            - active
            - delete
            - index
          description: The current state of the field.
        view_template:
          type: string
          description: The Mustache template for displaying the field in the UI.
