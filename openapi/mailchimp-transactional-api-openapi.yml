openapi: 3.1.0
info:
  title: Mailchimp Transactional API
  version: 1.0.0
  description: >-
    The Mailchimp Transactional API (formerly Mandrill) enables sending
    personalized, one-to-one transactional emails such as password resets,
    order confirmations, and welcome messages. It provides high-deliverability
    email infrastructure with detailed analytics, templates, and webhook support.
  contact:
    name: Mailchimp API Support
    email: apihelp@mailchimp.com
    url: https://mailchimp.com/developer/transactional/
  license:
    name: Mailchimp API Use Policy
    url: https://mailchimp.com/legal/api_use/
  termsOfService: https://mailchimp.com/legal/terms/

servers:
  - url: https://mandrillapp.com/api/1.0
    description: Mailchimp Transactional (Mandrill) Production API

security:
  - apiKey: []

tags:
  - name: Messages
    description: Send and search transactional messages, and retrieve message details.
  - name: Templates
    description: >-
      Manage reusable email templates stored on the Mandrill server for use
      when sending transactional messages.
  - name: Tags
    description: Manage tags and retrieve tag-level statistics for sent messages.
  - name: Senders
    description: >-
      Retrieve sender information and statistics for verified sending domains
      and email addresses.
  - name: Users
    description: Retrieve information about the authenticated Mandrill account.
  - name: Webhooks
    description: Manage webhooks that receive event notifications for sent messages.
  - name: Subaccounts
    description: >-
      Manage subaccounts for organizing sending and reporting within a single
      Mandrill account.
  - name: Rejects
    description: >-
      Manage the rejection blacklist, which prevents delivery to addresses
      that have previously bounced or been reported as spam.
  - name: Allowlists
    description: >-
      Manage the allowlist of email addresses that bypass the rejection
      blacklist.
  - name: IPs
    description: Manage dedicated IP addresses associated with the account.
  - name: Exports
    description: Request and download data exports for messages, rejects, and allowlists.
  - name: Metadata
    description: >-
      Manage custom metadata fields that can be attached to messages for
      tracking and filtering.

paths:
  /messages/send:
    post:
      operationId: postMessagesSend
      summary: Mailchimp Send a transactional email
      description: >-
        Send a new transactional message through Mandrill. Supports HTML and
        plain-text content, inline images, attachments, merge variables,
        metadata, and per-recipient customization.
      tags:
        - Messages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - key
                - message
              properties:
                key:
                  type: string
                  description: A valid Mandrill API key.
                message:
                  $ref: '#/components/schemas/MessagePayload'
                async:
                  type: boolean
                  description: >-
                    Enable background sending mode optimized for bulk sending.
                    In async mode, the response will not include per-recipient
                    status, and failures will be handled by retry or webhook.
                  default: false
                ip_pool:
                  type: string
                  description: >-
                    The name of the dedicated IP pool that should be used to
                    send this message.
                send_at:
                  type: string
                  format: date-time
                  description: >-
                    Schedule the message for future delivery. The date/time
                    must be in UTC and formatted as YYYY-MM-DD HH:MM:SS.
                    Messages can be scheduled up to 7 days in advance.
      responses:
        '200':
          description: >-
            An array of sending results, one per recipient. Each object
            contains the email address, status, reject reason (if any),
            and the message ID.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SendResult'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/InvalidKeyError'
        '500':
          $ref: '#/components/responses/GeneralError'

  /messages/send-template:
    post:
      operationId: postMessagesSendTemplate
      summary: Mailchimp Send an email using a template
      description: >-
        Send a new transactional message using a stored template. Template
        content blocks can be overridden with the template_content parameter.
        Merge variables in the template are populated from the message object.
      tags:
        - Messages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - key
                - template_name
                - template_content
                - message
              properties:
                key:
                  type: string
                  description: A valid Mandrill API key.
                template_name:
                  type: string
                  description: >-
                    The slug or name of the template stored in Mandrill to
                    use for this message.
                template_content:
                  type: array
                  description: >-
                    An array of objects with name/content pairs for injecting
                    content into editable regions defined in the template
                    using mc:edit attributes.
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: The name of the mc:edit content block to set.
                      content:
                        type: string
                        description: The HTML content to replace the block with.
                message:
                  $ref: '#/components/schemas/MessagePayload'
                async:
                  type: boolean
                  default: false
                  description: Enable background sending mode.
                ip_pool:
                  type: string
                  description: The name of the dedicated IP pool to use.
                send_at:
                  type: string
                  format: date-time
                  description: Schedule message for future delivery in UTC.
      responses:
        '200':
          description: An array of sending results, one per recipient.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SendResult'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/InvalidKeyError'
        '500':
          $ref: '#/components/responses/GeneralError'

  /messages/search:
    post:
      operationId: postMessagesSearch
      summary: Mailchimp Search sent messages
      description: >-
        Search recently sent messages and return matching results. You can
        filter by sending status, sender, tags, recipient, subject, and
        date range. Results are limited to the last 7 days.
      tags:
        - Messages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - key
              properties:
                key:
                  type: string
                  description: A valid Mandrill API key.
                query:
                  type: string
                  description: >-
                    Search terms to filter results. Supports full-text
                    search across message subject and email addresses.
                date_from:
                  type: string
                  format: date-time
                  description: Start date for the search range (UTC).
                date_to:
                  type: string
                  format: date-time
                  description: End date for the search range (UTC).
                tags:
                  type: array
                  items:
                    type: string
                  description: Tags that must be present on matching messages.
                senders:
                  type: array
                  items:
                    type: string
                  description: Sender addresses to filter by.
                api_keys:
                  type: array
                  items:
                    type: string
                  description: API keys to filter by for subaccount isolation.
                limit:
                  type: integer
                  default: 100
                  description: Maximum number of results to return (max 1000).
      responses:
        '200':
          description: An array of message info objects matching the search criteria.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MessageInfo'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/InvalidKeyError'
        '500':
          $ref: '#/components/responses/GeneralError'

  /messages/search-time-series:
    post:
      operationId: postMessagesSearchTimeSeries
      summary: Mailchimp Search message time series
      description: >-
        Search the content of recently sent messages and return aggregated
        hourly statistics for matching messages over time.
      tags:
        - Messages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - key
              properties:
                key:
                  type: string
                  description: A valid Mandrill API key.
                query:
                  type: string
                  description: Search terms to filter results.
                date_from:
                  type: string
                  format: date-time
                  description: Start date for the search range (UTC).
                date_to:
                  type: string
                  format: date-time
                  description: End date for the search range (UTC).
                tags:
                  type: array
                  items:
                    type: string
                  description: Tags that must be present on matching messages.
                senders:
                  type: array
                  items:
                    type: string
                  description: Sender addresses to filter by.
      responses:
        '200':
          description: An array of time series data points with hourly statistics.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TimeSeries'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/InvalidKeyError'
        '500':
          $ref: '#/components/responses/GeneralError'

  /messages/info:
    post:
      operationId: postMessagesInfo
      summary: Mailchimp Get message info
      description: >-
        Get the information for a single recently sent message including
        delivery status, open/click tracking, and metadata.
      tags:
        - Messages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - key
                - id
              properties:
                key:
                  type: string
                  description: A valid Mandrill API key.
                id:
                  type: string
                  description: The unique message ID returned from a send call.
      responses:
        '200':
          description: Detailed information about the message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/InvalidKeyError'
        '500':
          $ref: '#/components/responses/GeneralError'

  /messages/content:
    post:
      operationId: postMessagesContent
      summary: Mailchimp Get message content
      description: >-
        Get the full content of a recently sent message including the HTML
        body, text body, headers, and attachments.
      tags:
        - Messages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - key
                - id
              properties:
                key:
                  type: string
                  description: A valid Mandrill API key.
                id:
                  type: string
                  description: The unique message ID.
      responses:
        '200':
          description: The full content of the message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageContent'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/InvalidKeyError'
        '500':
          $ref: '#/components/responses/GeneralError'

  /messages/parse:
    post:
      operationId: postMessagesParse
      summary: Mailchimp Parse a raw MIME message
      description: >-
        Parse the full MIME document for an email message, returning the
        subject, recipients, HTML body, text body, headers, and attachments.
      tags:
        - Messages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - key
                - raw_message
              properties:
                key:
                  type: string
                  description: A valid Mandrill API key.
                raw_message:
                  type: string
                  description: The full MIME document of the message to parse.
      responses:
        '200':
          description: The parsed message content.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParsedMessage'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/InvalidKeyError'
        '500':
          $ref: '#/components/responses/GeneralError'

  /messages/send-raw:
    post:
      operationId: postMessagesSendRaw
      summary: Mailchimp Send a raw MIME message
      description: >-
        Take a raw MIME document and send it exactly as provided. Mandrill
        will not modify the message content, but will track opens and clicks
        if the appropriate headers are included.
      tags:
        - Messages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - key
                - raw_message
              properties:
                key:
                  type: string
                  description: A valid Mandrill API key.
                raw_message:
                  type: string
                  description: The full MIME document of the message to send.
                from_email:
                  type: string
                  format: email
                  description: >-
                    Override the from address in the raw message. If not
                    specified, the from address in the raw message is used.
                from_name:
                  type: string
                  description: Override the from name in the raw message.
                to:
                  type: array
                  items:
                    type: string
                    format: email
                  description: >-
                    Override the recipients in the raw message. If not
                    provided, recipients from the MIME headers are used.
                async:
                  type: boolean
                  default: false
                  description: Enable background sending mode.
                ip_pool:
                  type: string
                  description: The name of the dedicated IP pool to use.
                send_at:
                  type: string
                  format: date-time
                  description: Schedule message for future delivery in UTC.
                return_path_domain:
                  type: string
                  description: Custom domain for the return-path header.
      responses:
        '200':
          description: An array of sending results, one per recipient.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SendResult'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/InvalidKeyError'
        '500':
          $ref: '#/components/responses/GeneralError'

  /messages/list-scheduled:
    post:
      operationId: postMessagesListScheduled
      summary: Mailchimp List scheduled messages
      description: >-
        Get a list of messages that are scheduled for future delivery. Messages
        can be scheduled up to 7 days in advance.
      tags:
        - Messages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - key
              properties:
                key:
                  type: string
                  description: A valid Mandrill API key.
                to:
                  type: string
                  format: email
                  description: >-
                    Optional recipient email address to restrict results to
                    messages scheduled for a specific recipient.
      responses:
        '200':
          description: An array of scheduled message objects.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScheduledMessage'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/InvalidKeyError'
        '500':
          $ref: '#/components/responses/GeneralError'

  /messages/cancel-scheduled:
    post:
      operationId: postMessagesCancelScheduled
      summary: Mailchimp Cancel a scheduled message
      description: >-
        Cancel a message that has been scheduled for future delivery. The
        message must not have already been sent.
      tags:
        - Messages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - key
                - id
              properties:
                key:
                  type: string
                  description: A valid Mandrill API key.
                id:
                  type: string
                  description: The unique ID of the scheduled message to cancel.
      responses:
        '200':
          description: The details of the cancelled scheduled message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduledMessage'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/InvalidKeyError'
        '500':
          $ref: '#/components/responses/GeneralError'

  /messages/reschedule:
    post:
      operationId: postMessagesReschedule
      summary: Mailchimp Reschedule a message
      description: >-
        Reschedule a message that was previously scheduled for future delivery
        to a new date and time.
      tags:
        - Messages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - key
                - id
                - send_at
              properties:
                key:
                  type: string
                  description: A valid Mandrill API key.
                id:
                  type: string
                  description: The unique ID of the scheduled message to reschedule.
                send_at:
                  type: string
                  format: date-time
                  description: The new date and time to send the message in UTC.
      responses:
        '200':
          description: The updated scheduled message details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduledMessage'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/InvalidKeyError'
        '500':
          $ref: '#/components/responses/GeneralError'

  /templates/add:
    post:
      operationId: postTemplatesAdd
      summary: Mailchimp Add a new template
      description: >-
        Create a new template on the Mandrill server. Templates can contain
        merge variables and mc:edit content blocks for dynamic content
        injection at send time.
      tags:
        - Templates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - key
                - name
              properties:
                key:
                  type: string
                  description: A valid Mandrill API key.
                name:
                  type: string
                  description: The name for the new template (must be unique).
                from_email:
                  type: string
                  format: email
                  description: Default from address for the template.
                from_name:
                  type: string
                  description: Default from name for the template.
                subject:
                  type: string
                  description: Default subject line for the template.
                code:
                  type: string
                  description: The HTML code for the template with mc:edit regions.
                text:
                  type: string
                  description: Default text part of messages sent with this template.
                publish:
                  type: boolean
                  default: true
                  description: Whether to publish the template immediately.
                labels:
                  type: array
                  items:
                    type: string
                  description: Array of up to 10 labels to organize templates.
      responses:
        '200':
          description: The newly created template object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateInfo'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/InvalidKeyError'
        '500':
          $ref: '#/components/responses/GeneralError'

  /templates/info:
    post:
      operationId: postTemplatesInfo
      summary: Mailchimp Get template info
      description: >-
        Get the details for a specific template, including its code, default
        values, and publish status.
      tags:
        - Templates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - key
                - name
              properties:
                key:
                  type: string
                  description: A valid Mandrill API key.
                name:
                  type: string
                  description: The name of the existing template.
      responses:
        '200':
          description: The template details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateInfo'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/InvalidKeyError'
        '500':
          $ref: '#/components/responses/GeneralError'

  /templates/update:
    post:
      operationId: postTemplatesUpdate
      summary: Mailchimp Update a template
      description: >-
        Update an existing template with new values for any of its fields.
        Only the fields you include in the request body will be updated.
      tags:
        - Templates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - key
                - name
              properties:
                key:
                  type: string
                  description: A valid Mandrill API key.
                name:
                  type: string
                  description: The name of the existing template to update.
                from_email:
                  type: string
                  format: email
                  description: Updated default from address.
                from_name:
                  type: string
                  description: Updated default from name.
                subject:
                  type: string
                  description: Updated default subject line.
                code:
                  type: string
                  description: Updated HTML code for the template.
                text:
                  type: string
                  description: Updated default text part.
                publish:
                  type: boolean
                  description: Whether to publish the updated template immediately.
                labels:
                  type: array
                  items:
                    type: string
                  description: Updated array of labels.
      responses:
        '200':
          description: The updated template details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateInfo'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/InvalidKeyError'
        '500':
          $ref: '#/components/responses/GeneralError'

  /templates/publish:
    post:
      operationId: postTemplatesPublish
      summary: Mailchimp Publish a template
      description: >-
        Publish the most recent draft of an existing template, making it
        available for sending.
      tags:
        - Templates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - key
                - name
              properties:
                key:
                  type: string
                  description: A valid Mandrill API key.
                name:
                  type: string
                  description: The name of the template to publish.
      responses:
        '200':
          description: The published template details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateInfo'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/InvalidKeyError'
        '500':
          $ref: '#/components/responses/GeneralError'

  /templates/delete:
    post:
      operationId: postTemplatesDelete
      summary: Mailchimp Delete a template
      description: >-
        Permanently delete a template from the account. This action cannot
        be undone.
      tags:
        - Templates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - key
                - name
              properties:
                key:
                  type: string
                  description: A valid Mandrill API key.
                name:
                  type: string
                  description: The name of the template to delete.
      responses:
        '200':
          description: The deleted template details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateInfo'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/InvalidKeyError'
        '500':
          $ref: '#/components/responses/GeneralError'

  /templates/list:
    post:
      operationId: postTemplatesList
      summary: Mailchimp List templates
      description: Get a list of all templates available in the account.
      tags:
        - Templates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - key
              properties:
                key:
                  type: string
                  description: A valid Mandrill API key.
                label:
                  type: string
                  description: >-
                    Optional label to filter results. Only templates with the
                    given label will be returned.
      responses:
        '200':
          description: An array of template info objects.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TemplateInfo'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/InvalidKeyError'
        '500':
          $ref: '#/components/responses/GeneralError'

  /templates/time-series:
    post:
      operationId: postTemplatesTimeSeries
      summary: Mailchimp Get template time series
      description: >-
        Return the recent sending history for a template, aggregated by
        hourly time slots.
      tags:
        - Templates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - key
                - name
              properties:
                key:
                  type: string
                  description: A valid Mandrill API key.
                name:
                  type: string
                  description: The name of the existing template.
      responses:
        '200':
          description: An array of time series data for the template.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TimeSeries'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/InvalidKeyError'
        '500':
          $ref: '#/components/responses/GeneralError'

  /templates/render:
    post:
      operationId: postTemplatesRender
      summary: Mailchimp Render a template
      description: >-
        Render a template with the provided merge variables and template
        content, returning the final HTML that would be sent.
      tags:
        - Templates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - key
                - template_name
                - template_content
              properties:
                key:
                  type: string
                  description: A valid Mandrill API key.
                template_name:
                  type: string
                  description: The name of the template to render.
                template_content:
                  type: array
                  description: Content blocks to inject into mc:edit regions.
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: The name of the content block.
                      content:
                        type: string
                        description: The content to inject.
