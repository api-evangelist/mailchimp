components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-MC-ApiKey
      description: >-
        Mandrill uses API key authentication. The key is passed in the
        JSON request body as the "key" parameter for every call, or
        alternatively via the X-MC-ApiKey header.

  responses:
    ValidationError:
      description: The request parameters were invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InvalidKeyError:
      description: The provided API key is not valid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    GeneralError:
      description: An unexpected error occurred on the server.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      description: A standard error response from the Mandrill API.
      properties:
        status:
          type: string
          enum:
          - error
          description: Always "error" for error responses.
          example: error
        code:
          type: integer
          description: The numeric error code.
          example: 10
        name:
          type: string
          description: The name/type of the error (e.g., Invalid_Key, ValidationError).
          example: Example Title
        message:
          type: string
          description: A human-readable description of the error.

          example: example_value
    MessagePayload:
      type: object
      description: >-
        The message object containing all parameters for a transactional
        email, including recipients, content, attachments, and tracking
        options.
      properties:
        html:
          type: string
          description: The full HTML content of the message.
          example: example_value
        text:
          type: string
          description: The full plain-text content of the message.
          example: example_value
        subject:
          type: string
          description: The message subject line.
          example: example_value
        from_email:
          type: string
          format: email
          description: The sender email address.
          example: user@example.com
        from_name:
          type: string
          description: The sender display name.
          example: example_value
        to:
          type: array
          description: An array of recipient objects.
          items:
            type: object
            required:
            - email
            properties:
              email:
                type: string
                format: email
                description: The recipient email address.
              name:
                type: string
                description: The recipient display name.
              type:
                type: string
                enum:
                - to
                - cc
                - bcc
                default: to
                description: The recipient type (to, cc, or bcc).
          example: []
        headers:
          type: object
          additionalProperties:
            type: string
          description: Optional extra headers to add to the message (e.g., Reply-To).
          example: example_value
        important:
          type: boolean
          default: false
          description: Whether this message is important and should be delivered ahead of non-important messages.
          example: true
        track_opens:
          type: boolean
          description: Whether to enable open tracking for this message.
          example: true
        track_clicks:
          type: boolean
          description: Whether to enable click tracking for this message.
          example: true
        auto_text:
          type: boolean
          description: >-
            Whether to automatically generate a plain-text version from
            the HTML content.
          example: true
        auto_html:
          type: boolean
          description: >-
            Whether to automatically generate HTML from the plain-text
            content.
          example: true
        inline_css:
          type: boolean
          description: >-
            Whether to automatically inline all CSS styles from style
            blocks in the HTML content.
          example: true
        url_strip_qs:
          type: boolean
          description: Whether to strip query strings from URLs when aggregating tracked click data.
          example: https://www.example.com
        preserve_recipients:
          type: boolean
          description: Whether to show all recipients in the To header of each email.
          example: true
        view_content_link:
          type: boolean
          description: Whether to include a View Content Link in the Mandrill dashboard for this message.
          example: true
        bcc_address:
          type: string
          format: email
          description: An optional address to BCC on the message.
          example: example_value
        tracking_domain:
          type: string
          description: A custom domain to use for tracking opens and clicks.
          example: example_value
        signing_domain:
          type: string
          description: A custom domain to use for DKIM signing instead of the default.
          example: example_value
        return_path_domain:
          type: string
          description: A custom domain to use for the return-path header.
          example: example_value
        merge:
          type: boolean
          default: true
          description: Whether to evaluate merge tags in the message.
          example: true
        merge_language:
          type: string
          enum:
          - mailchimp
          - handlebars
          default: mailchimp
          description: The merge tag language to use (Mailchimp or Handlebars).
          example: mailchimp
        global_merge_vars:
          type: array
          description: Global merge variables applied to all recipients.
          items:
            type: object
            properties:
              name:
                type: string
                description: The global merge variable name.
              content:
                type: string
                description: The global merge variable value.
          example: []
        merge_vars:
          type: array
          description: Per-recipient merge variables.
          items:
            type: object
            properties:
              rcpt:
                type: string
                format: email
                description: The recipient email address.
              vars:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      description: The merge variable name.
                    content:
                      type: string
                      description: The merge variable value.
          example: []
        tags:
          type: array
          items:
            type: string
          description: An array of string tags to apply to this message for analytics.
          example: []
        subaccount:
          type: string
          description: The unique ID of a subaccount for this message.
          example: example_value
        google_analytics_domains:
          type: array
          items:
            type: string
          description: An array of domains for which Google Analytics tracking parameters will be appended.
          example: []
        google_analytics_campaign:
          type: string
          description: The utm_campaign tracking parameter for Google Analytics.
          example: example_value
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Key-value metadata to associate with the message.
          example: example_value
        recipient_metadata:
          type: array
          description: Per-recipient metadata.
          items:
            type: object
            properties:
              rcpt:
                type: string
                format: email
                description: The recipient email address.
              values:
                type: object
                additionalProperties:
                  type: string
                description: Key-value metadata for this recipient.
          example: []
        attachments:
          type: array
          description: An array of file attachments.
          items:
            type: object
            properties:
              type:
                type: string
                description: The MIME type of the attachment.
              name:
                type: string
                description: The file name of the attachment.
              content:
                type: string
                description: Base64-encoded content of the attachment.
          example: []
        images:
          type: array
          description: An array of inline images referenced with "cid:" in the HTML content.
          items:
            type: object
            properties:
              type:
                type: string
                description: The MIME type of the image (e.g., image/png).
              name:
                type: string
                description: The Content-ID of the image, referenced as "cid:name" in HTML.
              content:
                type: string
                description: Base64-encoded content of the image.

          example: []
    SendResult:
      type: object
      description: The result of sending a message to a single recipient.
      properties:
        email:
          type: string
          format: email
          description: The recipient email address.
          example: user@example.com
        status:
          type: string
          enum:
          - sent
          - queued
          - scheduled
          - rejected
          - invalid
          description: The sending status for this recipient.
          example: sent
        reject_reason:
          type: string
          enum:
          - hard-bounce
          - soft-bounce
          - spam
          - unsub
          - custom
          - invalid-sender
          - invalid
          - test-mode-limit
          - unsigned
          - rule
          description: The reason the message was rejected, if applicable.
          example: hard-bounce
        queued_reason:
          type: string
          description: The reason the message was queued instead of sent immediately.
          example: example_value
        _id:
          type: string
          description: The unique message ID for this recipient's message.

          example: '500123'
    MessageInfo:
      type: object
      description: Summary information about a sent message.
      properties:
        ts:
          type: integer
          description: The Unix timestamp when the message was sent.
          example: 10
        _id:
          type: string
          description: The unique message ID.
          example: '500123'
        sender:
          type: string
          format: email
          description: The sender email address.
          example: example_value
        template:
          type: string
          description: The template slug used, if any.
          example: example_value
        subject:
          type: string
          description: The subject line of the message.
          example: example_value
        email:
          type: string
          format: email
          description: The recipient email address.
          example: user@example.com
        tags:
          type: array
          items:
            type: string
          description: Tags applied to the message.
          example: []
        opens:
          type: integer
          description: The number of times the message was opened.
          example: 10
        opens_detail:
          type: array
          items:
            type: object
            properties:
              ts:
                type: integer
                description: Unix timestamp of the open event.
              ip:
                type: string
                description: IP address from which the message was opened.
              location:
                type: string
                description: Approximate geographic location of the open.
              ua:
                type: string
                description: User agent string of the client.
          description: Detailed open tracking events.
          example: []
        clicks:
          type: integer
          description: The number of link clicks in the message.
          example: 10
        clicks_detail:
          type: array
          items:
            type: object
            properties:
              ts:
                type: integer
                description: Unix timestamp of the click event.
              url:
                type: string
                description: The URL that was clicked.
              ip:
                type: string
                description: IP address of the clicker.
              location:
                type: string
                description: Approximate geographic location of the click.
              ua:
                type: string
                description: User agent string of the client.
          description: Detailed click tracking events.
          example: []
        state:
          type: string
          enum:
          - sent
          - bounced
          - rejected
          - soft-bounced
          - spam
          - unsub
          description: The current state of the message.
          example: sent
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Custom metadata attached to the message.

          example: example_value
    MessageDetail:
      type: object
      description: Detailed information about a specific message.
      allOf:
      - $ref: '#/components/schemas/MessageInfo'
      - type: object
        properties:
          smtp_events:
            type: array
            description: SMTP event log for the message delivery.
            items:
              type: object
              properties:
                ts:
                  type: integer
                  description: Unix timestamp of the SMTP event.
                type:
                  type: string
                  description: The type of SMTP event.
                diag:
                  type: string
                  description: Diagnostic information from the receiving server.
          resends:
            type: array
            description: A list of resend attempts for this message.
            items:
              type: object
              properties:
                ts:
                  type: integer
                  description: Unix timestamp of the resend.

    MessageContent:
      type: object
      description: The full content of a sent message.
      properties:
        ts:
          type: integer
          description: Unix timestamp of when the message was sent.
          example: 10
        _id:
          type: string
          description: The unique message ID.
          example: '500123'
        from_email:
          type: string
          format: email
          description: The sender email address.
          example: user@example.com
        from_name:
          type: string
          description: The sender display name.
          example: example_value
        subject:
          type: string
          description: The message subject line.
          example: example_value
        to:
          type: object
          properties:
            email:
              type: string
              format: email
              description: Recipient email address.
            name:
              type: string
              description: Recipient display name.
          description: The primary recipient.
          example: example_value
        tags:
          type: array
          items:
            type: string
          description: Tags applied to the message.
          example: []
        headers:
          type: object
          additionalProperties:
            type: string
          description: The full message headers.
          example: example_value
        text:
          type: string
          description: The plain-text body of the message.
          example: example_value
        html:
          type: string
          description: The HTML body of the message.
          example: example_value
        attachments:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                description: The attachment file name.
              type:
                type: string
                description: The MIME type of the attachment.
              content:
                type: string
                description: Base64-encoded attachment content.
          description: File attachments included in the message.

          example: []
    ParsedMessage:
      type: object
      description: A parsed MIME message.
      properties:
        subject:
          type: string
          description: The parsed subject line.
          example: example_value
        from_email:
          type: string
          format: email
          description: The parsed sender email address.
          example: user@example.com
        from_name:
          type: string
          description: The parsed sender name.
          example: example_value
        to:
          type: array
          items:
            type: object
            properties:
              email:
                type: string
                format: email
              name:
                type: string
          description: Parsed recipient list.
          example: []
        headers:
          type: object
          additionalProperties:
            type: string
          description: All parsed headers.
          example: example_value
        text:
          type: string
          description: The plain-text body.
          example: example_value
        html:
          type: string
          description: The HTML body.
          example: example_value
        attachments:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              type:
                type: string
              content:
                type: string
          description: Parsed file attachments.
          example: []
        images:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              type:
                type: string
              content:
                type: string
          description: Parsed inline images.

          example: []
    ScheduledMessage:
      type: object
