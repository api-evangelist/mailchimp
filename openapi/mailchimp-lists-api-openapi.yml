              campaign_defaults:
                type: object
                title: Campaign Defaults
                description: '[Default values for campaigns](https://mailchimp.com/help/edit-your-emails-subject-preview-text-from-name-or-from-email-address/) created for this list.'
                properties:
                  from_name:
                    type: string
