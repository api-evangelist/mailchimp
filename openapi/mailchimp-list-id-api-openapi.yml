        x-title: List ID
        in: path
        description: The unique ID for the list.
        required: true
        type: string
        example: '500123'
      - name: segment_id
        x-title: Segment ID
        in: path
        description: The unique id for the segment.
        required: true
        type: string
        example: '500123'
