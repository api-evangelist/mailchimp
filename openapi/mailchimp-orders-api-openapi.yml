  /ecommerce/stores/{store_id}/orders:
    get:
      summary: Mailchimp List Orders
      description: Get information about a store's orders.
      operationId: getEcommerceStoresIdOrders
      parameters:
      - name: fields
        x-title: Fields
        in: query
        description: A comma-separated list of fields to return. Reference parameters of sub-objects with dot notation.
        required: false
        type: array
        collectionFormat: csv
        items:
          type: string
        example: example_value
      - name: exclude_fields
        x-title: Exclude Fields
        in: query
        description: A comma-separated list of fields to exclude. Reference parameters of sub-objects with dot notation.
        required: false
        type: array
        collectionFormat: csv
        items:
          type: string
        example: example_value
      - name: count
        x-title: Count
        in: query
        description: The number of records to return. Default value is 10. Maximum value is 1000
        required: false
        default: 10
        maximum: 1000
        type: integer
        example: example_value
      - name: offset
        x-title: Offset
        in: query
        description: Used for [pagination](https://mailchimp.com/developer/marketing/docs/methods-parameters/#pagination), this it the number of records from a collection to skip. Default value is 0.
        required: false
        default: 0
        type: integer
        example: example_value
      - name: store_id
        x-title: Store ID
        description: The store id.
        in: path
        required: true
        type: string
        example: '500123'
      - name: customer_id
        x-title: Customer ID
        in: query
        required: false
        description: Restrict results to orders made by a specific customer.
        type: string
        example: '500123'
      - name: has_outreach
        x-title: Has Outreach
        in: query
        required: false
        description: Restrict results to orders that have an outreach attached. For example, an email campaign or Facebook ad.
        type: boolean
        example: example_value
      - name: campaign_id
        x-title: Campaign ID
        in: query
        description: Restrict results to orders with a specific `campaign_id` value.
        required: false
        type: string
        example: '500123'
      - name: outreach_id
        x-title: Outreach ID
        in: query
        description: Restrict results to orders with a specific `outreach_id` value.
        required: false
        type: string
        example: '500123'
      responses:
        '200':
          description: ''
          schema:
            type: object
            title: Orders
