naftiko: 1.0.0-alpha2
info:
  label: Mailchimp Marketing API  — Root
  description: 'Mailchimp Marketing API  — Root. 1 operations. Lead operation: Mailchimp List Api Root Resources. Self-contained
    Naftiko capability covering one Mailchimp business surface.'
  tags:
  - Mailchimp
  - Root
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MAILCHIMP_API_KEY: MAILCHIMP_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-root
    baseUri: https://server.api.mailchimp.com/3.0
    description: Mailchimp Marketing API  — Root business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: getroot
        method: GET
        description: Mailchimp List Api Root Resources
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: A comma-separated list of fields to return. Reference parameters of sub-objects with dot notation.
        - name: exclude_fields
          in: query
          type: array
          description: A comma-separated list of fields to exclude. Reference parameters of sub-objects with dot notation.
  exposes:
  - type: rest
    namespace: marketing-root-rest
    port: 8080
    description: REST adapter for Mailchimp Marketing API  — Root. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: GET
        name: getroot
        description: Mailchimp List Api Root Resources
        call: marketing-root.getroot
        with:
          fields: rest.fields
          exclude_fields: rest.exclude_fields
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-root-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mailchimp Marketing API  — Root. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: mailchimp-list-api-root-resources
      description: Mailchimp List Api Root Resources
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-root.getroot
      with:
        fields: tools.fields
        exclude_fields: tools.exclude_fields
      outputParameters:
      - type: object
        mapping: $.
