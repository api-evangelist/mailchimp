naftiko: 1.0.0-alpha2
info:
  label: Mailchimp Marketing API  — Tests
  description: 'Mailchimp Marketing API  — Tests. 1 operations. Lead operation: Mailchimp Send Test Email. Self-contained
    Naftiko capability covering one Mailchimp business surface.'
  tags:
  - Mailchimp
  - Tests
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MAILCHIMP_API_KEY: MAILCHIMP_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-tests
    baseUri: https://server.api.mailchimp.com/3.0
    description: Mailchimp Marketing API  — Tests business capability. Self-contained, no shared references.
    resources:
    - name: campaigns-campaign_id-actions-test
      path: /campaigns/{campaign_id}/actions/test
      operations:
      - name: postcampaignsidactionstest
        method: POST
        description: Mailchimp Send Test Email
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: campaign_id
          in: path
          type: string
          description: The unique id for the campaign.
          required: true
        - name: body
          in: body
          type: object
          required: true
  exposes:
  - type: rest
    namespace: marketing-tests-rest
    port: 8080
    description: REST adapter for Mailchimp Marketing API  — Tests. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/campaigns/{campaign-id}/actions/test
      name: campaigns-campaign-id-actions-test
      description: REST surface for campaigns-campaign_id-actions-test.
      operations:
      - method: POST
        name: postcampaignsidactionstest
        description: Mailchimp Send Test Email
        call: marketing-tests.postcampaignsidactionstest
        with:
          campaign_id: rest.campaign_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-tests-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mailchimp Marketing API  — Tests. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: mailchimp-send-test-email
      description: Mailchimp Send Test Email
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: marketing-tests.postcampaignsidactionstest
      with:
        campaign_id: tools.campaign_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
