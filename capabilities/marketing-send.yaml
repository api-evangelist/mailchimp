naftiko: 1.0.0-alpha2
info:
  label: Mailchimp Marketing API  — Send
  description: 'Mailchimp Marketing API  — Send. 3 operations. Lead operation: Mailchimp Cancel Campaign. Self-contained Naftiko
    capability covering one Mailchimp business surface.'
  tags:
  - Mailchimp
  - Send
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MAILCHIMP_API_KEY: MAILCHIMP_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-send
    baseUri: https://server.api.mailchimp.com/3.0
    description: Mailchimp Marketing API  — Send business capability. Self-contained, no shared references.
    resources:
    - name: campaigns-campaign_id-actions-cancel-send
      path: /campaigns/{campaign_id}/actions/cancel-send
      operations:
      - name: postcampaignsidactionscancelsend
        method: POST
        description: Mailchimp Cancel Campaign
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: campaign_id
          in: path
          type: string
          description: The unique id for the campaign.
          required: true
    - name: campaigns-campaign_id-actions-send
      path: /campaigns/{campaign_id}/actions/send
      operations:
      - name: postcampaignsidactionssend
        method: POST
        description: Mailchimp Send Campaign
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: campaign_id
          in: path
          type: string
          description: The unique id for the campaign.
          required: true
    - name: campaigns-campaign_id-send-checklist
      path: /campaigns/{campaign_id}/send-checklist
      operations:
      - name: getcampaignsidsendchecklist
        method: GET
        description: Mailchimp Get Campaign Send Checklist
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: A comma-separated list of fields to return. Reference parameters of sub-objects with dot notation.
        - name: exclude_fields
          in: query
          type: array
          description: A comma-separated list of fields to exclude. Reference parameters of sub-objects with dot notation.
        - name: campaign_id
          in: path
          type: string
          description: The unique id for the campaign.
          required: true
  exposes:
  - type: rest
    namespace: marketing-send-rest
    port: 8080
    description: REST adapter for Mailchimp Marketing API  — Send. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/campaigns/{campaign-id}/actions/cancel-send
      name: campaigns-campaign-id-actions-cancel-send
      description: REST surface for campaigns-campaign_id-actions-cancel-send.
      operations:
      - method: POST
        name: postcampaignsidactionscancelsend
        description: Mailchimp Cancel Campaign
        call: marketing-send.postcampaignsidactionscancelsend
        with:
          campaign_id: rest.campaign_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/campaigns/{campaign-id}/actions/send
      name: campaigns-campaign-id-actions-send
      description: REST surface for campaigns-campaign_id-actions-send.
      operations:
      - method: POST
        name: postcampaignsidactionssend
        description: Mailchimp Send Campaign
        call: marketing-send.postcampaignsidactionssend
        with:
          campaign_id: rest.campaign_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/campaigns/{campaign-id}/send-checklist
      name: campaigns-campaign-id-send-checklist
      description: REST surface for campaigns-campaign_id-send-checklist.
      operations:
      - method: GET
        name: getcampaignsidsendchecklist
        description: Mailchimp Get Campaign Send Checklist
        call: marketing-send.getcampaignsidsendchecklist
        with:
          fields: rest.fields
          exclude_fields: rest.exclude_fields
          campaign_id: rest.campaign_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-send-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mailchimp Marketing API  — Send. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: mailchimp-cancel-campaign
      description: Mailchimp Cancel Campaign
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-send.postcampaignsidactionscancelsend
      with:
        campaign_id: tools.campaign_id
      outputParameters:
      - type: object
        mapping: $.
    - name: mailchimp-send-campaign
      description: Mailchimp Send Campaign
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-send.postcampaignsidactionssend
      with:
        campaign_id: tools.campaign_id
      outputParameters:
      - type: object
        mapping: $.
    - name: mailchimp-get-campaign-send-checklist
      description: Mailchimp Get Campaign Send Checklist
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-send.getcampaignsidsendchecklist
      with:
        fields: tools.fields
        exclude_fields: tools.exclude_fields
        campaign_id: tools.campaign_id
      outputParameters:
      - type: object
        mapping: $.
