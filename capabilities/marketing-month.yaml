naftiko: 1.0.0-alpha2
info:
  label: Mailchimp Marketing API  — Month
  description: 'Mailchimp Marketing API  — Month. 1 operations. Lead operation: Mailchimp Get Growth History by Month. Self-contained
    Naftiko capability covering one Mailchimp business surface.'
  tags:
  - Mailchimp
  - Month
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MAILCHIMP_API_KEY: MAILCHIMP_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-month
    baseUri: https://server.api.mailchimp.com/3.0
    description: Mailchimp Marketing API  — Month business capability. Self-contained, no shared references.
    resources:
    - name: lists-list_id-growth-history-month
      path: /lists/{list_id}/growth-history/{month}
      operations:
      - name: getlistsidgrowthhistoryid
        method: GET
        description: Mailchimp Get Growth History by Month
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: A comma-separated list of fields to return. Reference parameters of sub-objects with dot notation.
        - name: exclude_fields
          in: query
          type: array
          description: A comma-separated list of fields to exclude. Reference parameters of sub-objects with dot notation.
        - name: list_id
          in: path
          type: string
          description: The unique ID for the list.
          required: true
        - name: month
          in: path
          type: string
          description: A specific month of list growth history.
          required: true
  exposes:
  - type: rest
    namespace: marketing-month-rest
    port: 8080
    description: REST adapter for Mailchimp Marketing API  — Month. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/lists/{list-id}/growth-history/{month}
      name: lists-list-id-growth-history-month
      description: REST surface for lists-list_id-growth-history-month.
      operations:
      - method: GET
        name: getlistsidgrowthhistoryid
        description: Mailchimp Get Growth History by Month
        call: marketing-month.getlistsidgrowthhistoryid
        with:
          fields: rest.fields
          exclude_fields: rest.exclude_fields
          list_id: rest.list_id
          month: rest.month
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-month-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mailchimp Marketing API  — Month. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: mailchimp-get-growth-history-month
      description: Mailchimp Get Growth History by Month
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-month.getlistsidgrowthhistoryid
      with:
        fields: tools.fields
        exclude_fields: tools.exclude_fields
        list_id: tools.list_id
        month: tools.month
      outputParameters:
      - type: object
        mapping: $.
