naftiko: 1.0.0-alpha2
info:
  label: Mailchimp Marketing API  — Publish
  description: 'Mailchimp Marketing API  — Publish. 2 operations. Lead operation: Mailchimp Publish Landing Page. Self-contained
    Naftiko capability covering one Mailchimp business surface.'
  tags:
  - Mailchimp
  - Publish
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MAILCHIMP_API_KEY: MAILCHIMP_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-publish
    baseUri: https://server.api.mailchimp.com/3.0
    description: Mailchimp Marketing API  — Publish business capability. Self-contained, no shared references.
    resources:
    - name: landing-pages-page_id-actions-publish
      path: /landing-pages/{page_id}/actions/publish
      operations:
      - name: postlandingpageidactionspublish
        method: POST
        description: Mailchimp Publish Landing Page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page_id
          in: path
          type: string
          description: The unique id for the page.
          required: true
    - name: lists-list_id-surveys-survey_id-actions-publish
      path: /lists/{list_id}/surveys/{survey_id}/actions/publish
      operations:
      - name: postlistsidsurveysidactionspublish
        method: POST
        description: Mailchimp Publish a Survey
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: list_id
          in: path
          type: string
          description: The unique ID for the list.
          required: true
        - name: survey_id
          in: path
          type: string
          description: The ID of the survey.
          required: true
  exposes:
  - type: rest
    namespace: marketing-publish-rest
    port: 8080
    description: REST adapter for Mailchimp Marketing API  — Publish. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/landing-pages/{page-id}/actions/publish
      name: landing-pages-page-id-actions-publish
      description: REST surface for landing-pages-page_id-actions-publish.
      operations:
      - method: POST
        name: postlandingpageidactionspublish
        description: Mailchimp Publish Landing Page
        call: marketing-publish.postlandingpageidactionspublish
        with:
          page_id: rest.page_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/lists/{list-id}/surveys/{survey-id}/actions/publish
      name: lists-list-id-surveys-survey-id-actions-publish
      description: REST surface for lists-list_id-surveys-survey_id-actions-publish.
      operations:
      - method: POST
        name: postlistsidsurveysidactionspublish
        description: Mailchimp Publish a Survey
        call: marketing-publish.postlistsidsurveysidactionspublish
        with:
          list_id: rest.list_id
          survey_id: rest.survey_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-publish-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mailchimp Marketing API  — Publish. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: mailchimp-publish-landing-page
      description: Mailchimp Publish Landing Page
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-publish.postlandingpageidactionspublish
      with:
        page_id: tools.page_id
      outputParameters:
      - type: object
        mapping: $.
    - name: mailchimp-publish-survey
      description: Mailchimp Publish a Survey
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-publish.postlistsidsurveysidactionspublish
      with:
        list_id: tools.list_id
        survey_id: tools.survey_id
      outputParameters:
      - type: object
        mapping: $.
