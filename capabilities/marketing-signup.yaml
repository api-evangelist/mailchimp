naftiko: 1.0.0-alpha2
info:
  label: Mailchimp Marketing API  — Signup
  description: 'Mailchimp Marketing API  — Signup. 2 operations. Lead operation: Mailchimp List Signup Forms. Self-contained
    Naftiko capability covering one Mailchimp business surface.'
  tags:
  - Mailchimp
  - Signup
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MAILCHIMP_API_KEY: MAILCHIMP_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-signup
    baseUri: https://server.api.mailchimp.com/3.0
    description: Mailchimp Marketing API  — Signup business capability. Self-contained, no shared references.
    resources:
    - name: lists-list_id-signup-forms
      path: /lists/{list_id}/signup-forms
      operations:
      - name: getlistsidsignupforms
        method: GET
        description: Mailchimp List Signup Forms
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: list_id
          in: path
          type: string
          description: The unique ID for the list.
          required: true
      - name: postlistsidsignupforms
        method: POST
        description: Mailchimp Customize Signup Form
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: list_id
          in: path
          type: string
          description: The unique ID for the list.
          required: true
        - name: body
          in: body
          type: object
          required: true
  exposes:
  - type: rest
    namespace: marketing-signup-rest
    port: 8080
    description: REST adapter for Mailchimp Marketing API  — Signup. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/lists/{list-id}/signup-forms
      name: lists-list-id-signup-forms
      description: REST surface for lists-list_id-signup-forms.
      operations:
      - method: GET
        name: getlistsidsignupforms
        description: Mailchimp List Signup Forms
        call: marketing-signup.getlistsidsignupforms
        with:
          list_id: rest.list_id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postlistsidsignupforms
        description: Mailchimp Customize Signup Form
        call: marketing-signup.postlistsidsignupforms
        with:
          list_id: rest.list_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-signup-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mailchimp Marketing API  — Signup. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: mailchimp-list-signup-forms
      description: Mailchimp List Signup Forms
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-signup.getlistsidsignupforms
      with:
        list_id: tools.list_id
      outputParameters:
      - type: object
        mapping: $.
    - name: mailchimp-customize-signup-form
      description: Mailchimp Customize Signup Form
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-signup.postlistsidsignupforms
      with:
        list_id: tools.list_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
