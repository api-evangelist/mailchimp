        description: Mailchimp Delete Campaign Feedback Message
        call: marketing-feedback.deletecampaignsidfeedbackid
        with:
          campaign_id: rest.campaign_id
          feedback_id: rest.feedback_id
        outputParameters:
        - type: object
          mapping: $.
