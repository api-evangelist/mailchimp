    description: Mailchimp Marketing API  — Feedback business capability. Self-contained, no shared references.
    resources:
    - name: campaigns-campaign_id-feedback
      path: /campaigns/{campaign_id}/feedback
      operations:
      - name: getcampaignsidfeedback
        method: GET
        description: Mailchimp List Campaign Feedback
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: A comma-separated list of fields to return. Reference parameters of sub-objects with dot notation.
        - name: exclude_fields
          in: query
          type: array
          description: A comma-separated list of fields to exclude. Reference parameters of sub-objects with dot notation.
        - name: campaign_id
          in: path
          type: string
          description: The unique id for the campaign.
          required: true
      - name: postcampaignsidfeedback
        method: POST
        description: Mailchimp Add Campaign Feedback
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: campaign_id
          in: path
          type: string
          description: The unique id for the campaign.
          required: true
        - name: body
          in: body
          type: object
          required: true
    - name: campaigns-campaign_id-feedback-feedback_id
      path: /campaigns/{campaign_id}/feedback/{feedback_id}
      operations:
