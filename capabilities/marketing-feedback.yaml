    namespace: marketing-feedback-rest
    port: 8080
    description: REST adapter for Mailchimp Marketing API  — Feedback. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/campaigns/{campaign-id}/feedback
      name: campaigns-campaign-id-feedback
      description: REST surface for campaigns-campaign_id-feedback.
      operations:
      - method: GET
        name: getcampaignsidfeedback
        description: Mailchimp List Campaign Feedback
        call: marketing-feedback.getcampaignsidfeedback
        with:
