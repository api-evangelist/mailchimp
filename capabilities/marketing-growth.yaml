naftiko: 1.0.0-alpha2
info:
  label: Mailchimp Marketing API  — Growth
  description: 'Mailchimp Marketing API  — Growth. 2 operations. Lead operation: Mailchimp List Growth History Data. Self-contained
    Naftiko capability covering one Mailchimp business surface.'
  tags:
  - Mailchimp
  - Growth
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MAILCHIMP_API_KEY: MAILCHIMP_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-growth
    baseUri: https://server.api.mailchimp.com/3.0
    description: Mailchimp Marketing API  — Growth business capability. Self-contained, no shared references.
    resources:
    - name: lists-list_id-growth-history
      path: /lists/{list_id}/growth-history
      operations:
      - name: getlistsidgrowthhistory
        method: GET
        description: Mailchimp List Growth History Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: A comma-separated list of fields to return. Reference parameters of sub-objects with dot notation.
        - name: exclude_fields
          in: query
          type: array
          description: A comma-separated list of fields to exclude. Reference parameters of sub-objects with dot notation.
        - name: count
          in: query
          type: integer
          description: The number of records to return. Default value is 10. Maximum value is 1000
        - name: offset
          in: query
          type: integer
          description: Used for [pagination](https://mailchimp.com/developer/marketing/docs/methods-parameters/#pagination),
            this it the number of records from a collection to skip. D
        - name: list_id
          in: path
          type: string
          description: The unique ID for the list.
          required: true
        - name: sort_field
          in: query
          type: string
          description: Returns files sorted by the specified field.
        - name: sort_dir
          in: query
          type: string
          description: Determines the order direction for sorted results.
    - name: lists-list_id-growth-history-month
      path: /lists/{list_id}/growth-history/{month}
      operations:
      - name: getlistsidgrowthhistoryid
        method: GET
        description: Mailchimp Get Growth History by Month
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: A comma-separated list of fields to return. Reference parameters of sub-objects with dot notation.
        - name: exclude_fields
          in: query
          type: array
          description: A comma-separated list of fields to exclude. Reference parameters of sub-objects with dot notation.
        - name: list_id
          in: path
          type: string
          description: The unique ID for the list.
          required: true
        - name: month
          in: path
          type: string
          description: A specific month of list growth history.
          required: true
  exposes:
  - type: rest
    namespace: marketing-growth-rest
    port: 8080
    description: REST adapter for Mailchimp Marketing API  — Growth. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/lists/{list-id}/growth-history
      name: lists-list-id-growth-history
      description: REST surface for lists-list_id-growth-history.
      operations:
      - method: GET
        name: getlistsidgrowthhistory
        description: Mailchimp List Growth History Data
        call: marketing-growth.getlistsidgrowthhistory
        with:
          fields: rest.fields
          exclude_fields: rest.exclude_fields
          count: rest.count
          offset: rest.offset
          list_id: rest.list_id
          sort_field: rest.sort_field
          sort_dir: rest.sort_dir
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/lists/{list-id}/growth-history/{month}
      name: lists-list-id-growth-history-month
      description: REST surface for lists-list_id-growth-history-month.
      operations:
      - method: GET
        name: getlistsidgrowthhistoryid
        description: Mailchimp Get Growth History by Month
        call: marketing-growth.getlistsidgrowthhistoryid
        with:
          fields: rest.fields
          exclude_fields: rest.exclude_fields
          list_id: rest.list_id
          month: rest.month
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-growth-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mailchimp Marketing API  — Growth. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: mailchimp-list-growth-history-data
      description: Mailchimp List Growth History Data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-growth.getlistsidgrowthhistory
      with:
        fields: tools.fields
        exclude_fields: tools.exclude_fields
        count: tools.count
        offset: tools.offset
        list_id: tools.list_id
        sort_field: tools.sort_field
        sort_dir: tools.sort_dir
      outputParameters:
      - type: object
        mapping: $.
    - name: mailchimp-get-growth-history-month
      description: Mailchimp Get Growth History by Month
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-growth.getlistsidgrowthhistoryid
      with:
        fields: tools.fields
        exclude_fields: tools.exclude_fields
        list_id: tools.list_id
        month: tools.month
      outputParameters:
      - type: object
        mapping: $.
