        name: getverifieddomains
        description: Mailchimp List Sending Domains
        call: marketing-verified.getverifieddomains
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createverifieddomain
        description: Mailchimp Add Domain to Account
        call: marketing-verified.createverifieddomain
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/verified-domains/{domain-name}
