      operations:
      - name: getverifieddomains
        method: GET
        description: Mailchimp List Sending Domains
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createverifieddomain
        method: POST
        description: Mailchimp Add Domain to Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
