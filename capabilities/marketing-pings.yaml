naftiko: 1.0.0-alpha2
info:
  label: Mailchimp Marketing API  — Pings
  description: 'Mailchimp Marketing API  — Pings. 1 operations. Lead operation: Mailchimp Ping. Self-contained Naftiko capability
    covering one Mailchimp business surface.'
  tags:
  - Mailchimp
  - Pings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MAILCHIMP_API_KEY: MAILCHIMP_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-pings
    baseUri: https://server.api.mailchimp.com/3.0
    description: Mailchimp Marketing API  — Pings business capability. Self-contained, no shared references.
    resources:
    - name: ping
      path: /ping
      operations:
      - name: getping
        method: GET
        description: Mailchimp Ping
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: marketing-pings-rest
    port: 8080
    description: REST adapter for Mailchimp Marketing API  — Pings. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/ping
      name: ping
      description: REST surface for ping.
      operations:
      - method: GET
        name: getping
        description: Mailchimp Ping
        call: marketing-pings.getping
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-pings-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mailchimp Marketing API  — Pings. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: mailchimp-ping
      description: Mailchimp Ping
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-pings.getping
      outputParameters:
      - type: object
        mapping: $.
