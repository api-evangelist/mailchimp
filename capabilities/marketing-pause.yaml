naftiko: 1.0.0-alpha2
info:
  label: Mailchimp Marketing API  — Pause
  description: 'Mailchimp Marketing API  — Pause. 3 operations. Lead operation: Mailchimp Pause Automation Emails. Self-contained
    Naftiko capability covering one Mailchimp business surface.'
  tags:
  - Mailchimp
  - Pause
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MAILCHIMP_API_KEY: MAILCHIMP_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-pause
    baseUri: https://server.api.mailchimp.com/3.0
    description: Mailchimp Marketing API  — Pause business capability. Self-contained, no shared references.
    resources:
    - name: automations-workflow_id-actions-pause-all-emails
      path: /automations/{workflow_id}/actions/pause-all-emails
      operations:
      - name: postautomationsidactionspauseallemails
        method: POST
        description: Mailchimp Pause Automation Emails
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workflow_id
          in: path
          type: string
          description: The unique id for the Automation workflow.
          required: true
    - name: automations-workflow_id-emails-workflow_email_id-actions-pause
      path: /automations/{workflow_id}/emails/{workflow_email_id}/actions/pause
      operations:
      - name: postautomationsidemailsidactionspause
        method: POST
        description: Mailchimp Pause Automated Email
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workflow_id
          in: path
          type: string
          description: The unique id for the Automation workflow.
          required: true
        - name: workflow_email_id
          in: path
          type: string
          description: The unique id for the Automation workflow email.
          required: true
    - name: campaigns-campaign_id-actions-pause
      path: /campaigns/{campaign_id}/actions/pause
      operations:
      - name: postcampaignsidactionspause
        method: POST
        description: Mailchimp Pause Rss Campaign
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: campaign_id
          in: path
          type: string
          description: The unique id for the campaign.
          required: true
  exposes:
  - type: rest
    namespace: marketing-pause-rest
    port: 8080
    description: REST adapter for Mailchimp Marketing API  — Pause. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/automations/{workflow-id}/actions/pause-all-emails
      name: automations-workflow-id-actions-pause-all-emails
      description: REST surface for automations-workflow_id-actions-pause-all-emails.
      operations:
      - method: POST
        name: postautomationsidactionspauseallemails
        description: Mailchimp Pause Automation Emails
        call: marketing-pause.postautomationsidactionspauseallemails
        with:
          workflow_id: rest.workflow_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/automations/{workflow-id}/emails/{workflow-email-id}/actions/pause
      name: automations-workflow-id-emails-workflow-email-id-actions-pause
      description: REST surface for automations-workflow_id-emails-workflow_email_id-actions-pause.
      operations:
      - method: POST
        name: postautomationsidemailsidactionspause
        description: Mailchimp Pause Automated Email
        call: marketing-pause.postautomationsidemailsidactionspause
        with:
          workflow_id: rest.workflow_id
          workflow_email_id: rest.workflow_email_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/campaigns/{campaign-id}/actions/pause
      name: campaigns-campaign-id-actions-pause
      description: REST surface for campaigns-campaign_id-actions-pause.
      operations:
      - method: POST
        name: postcampaignsidactionspause
        description: Mailchimp Pause Rss Campaign
        call: marketing-pause.postcampaignsidactionspause
        with:
          campaign_id: rest.campaign_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-pause-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mailchimp Marketing API  — Pause. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: mailchimp-pause-automation-emails
      description: Mailchimp Pause Automation Emails
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-pause.postautomationsidactionspauseallemails
      with:
        workflow_id: tools.workflow_id
      outputParameters:
      - type: object
        mapping: $.
    - name: mailchimp-pause-automated-email
      description: Mailchimp Pause Automated Email
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-pause.postautomationsidemailsidactionspause
      with:
        workflow_id: tools.workflow_id
        workflow_email_id: tools.workflow_email_id
      outputParameters:
      - type: object
        mapping: $.
    - name: mailchimp-pause-rss-campaign
      description: Mailchimp Pause Rss Campaign
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-pause.postcampaignsidactionspause
      with:
        campaign_id: tools.campaign_id
      outputParameters:
      - type: object
        mapping: $.
