naftiko: 1.0.0-alpha2
info:
  label: Mailchimp Marketing API  — Clients
  description: 'Mailchimp Marketing API  — Clients. 1 operations. Lead operation: Mailchimp List Top Email Clients. Self-contained
    Naftiko capability covering one Mailchimp business surface.'
  tags:
  - Mailchimp
  - Clients
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MAILCHIMP_API_KEY: MAILCHIMP_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-clients
    baseUri: https://server.api.mailchimp.com/3.0
    description: Mailchimp Marketing API  — Clients business capability. Self-contained, no shared references.
    resources:
    - name: lists-list_id-clients
      path: /lists/{list_id}/clients
      operations:
      - name: getlistsidclients
        method: GET
        description: Mailchimp List Top Email Clients
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: A comma-separated list of fields to return. Reference parameters of sub-objects with dot notation.
        - name: exclude_fields
          in: query
          type: array
          description: A comma-separated list of fields to exclude. Reference parameters of sub-objects with dot notation.
        - name: list_id
          in: path
          type: string
          description: The unique ID for the list.
          required: true
  exposes:
  - type: rest
    namespace: marketing-clients-rest
    port: 8080
    description: REST adapter for Mailchimp Marketing API  — Clients. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/lists/{list-id}/clients
      name: lists-list-id-clients
      description: REST surface for lists-list_id-clients.
      operations:
      - method: GET
        name: getlistsidclients
        description: Mailchimp List Top Email Clients
        call: marketing-clients.getlistsidclients
        with:
          fields: rest.fields
          exclude_fields: rest.exclude_fields
          list_id: rest.list_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-clients-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mailchimp Marketing API  — Clients. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: mailchimp-list-top-email-clients
      description: Mailchimp List Top Email Clients
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-clients.getlistsidclients
      with:
        fields: tools.fields
        exclude_fields: tools.exclude_fields
        list_id: tools.list_id
      outputParameters:
      - type: object
        mapping: $.
