naftiko: 1.0.0-alpha2
info:
  label: Mailchimp Marketing API  — Batches
  description: 'Mailchimp Marketing API  — Batches. 4 operations. Lead operation: Mailchimp List Batch Requests. Self-contained
    Naftiko capability covering one Mailchimp business surface.'
  tags:
  - Mailchimp
  - Batches
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MAILCHIMP_API_KEY: MAILCHIMP_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-batches
    baseUri: https://server.api.mailchimp.com/3.0
    description: Mailchimp Marketing API  — Batches business capability. Self-contained, no shared references.
    resources:
    - name: batches
      path: /batches
      operations:
      - name: getbatches
        method: GET
        description: Mailchimp List Batch Requests
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: A comma-separated list of fields to return. Reference parameters of sub-objects with dot notation.
        - name: exclude_fields
          in: query
          type: array
          description: A comma-separated list of fields to exclude. Reference parameters of sub-objects with dot notation.
        - name: count
          in: query
          type: integer
          description: The number of records to return. Default value is 10. Maximum value is 1000
        - name: offset
          in: query
          type: integer
          description: Used for [pagination](https://mailchimp.com/developer/marketing/docs/methods-parameters/#pagination),
            this it the number of records from a collection to skip. D
      - name: postbatches
        method: POST
        description: Mailchimp Start Batch Operation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: batches-batch_id
      path: /batches/{batch_id}
      operations:
      - name: getbatchesid
        method: GET
        description: Mailchimp Get Batch Operation Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: A comma-separated list of fields to return. Reference parameters of sub-objects with dot notation.
        - name: exclude_fields
          in: query
          type: array
          description: A comma-separated list of fields to exclude. Reference parameters of sub-objects with dot notation.
        - name: batch_id
          in: path
          type: string
          description: The unique id for the batch operation.
          required: true
      - name: deletebatchesid
        method: DELETE
        description: Mailchimp Delete Batch Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: batch_id
          in: path
          type: string
          description: The unique id for the batch operation.
          required: true
  exposes:
  - type: rest
    namespace: marketing-batches-rest
    port: 8080
    description: REST adapter for Mailchimp Marketing API  — Batches. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/batches
      name: batches
      description: REST surface for batches.
      operations:
      - method: GET
        name: getbatches
        description: Mailchimp List Batch Requests
        call: marketing-batches.getbatches
        with:
          fields: rest.fields
          exclude_fields: rest.exclude_fields
          count: rest.count
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postbatches
        description: Mailchimp Start Batch Operation
        call: marketing-batches.postbatches
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/batches/{batch-id}
      name: batches-batch-id
      description: REST surface for batches-batch_id.
      operations:
      - method: GET
        name: getbatchesid
        description: Mailchimp Get Batch Operation Status
        call: marketing-batches.getbatchesid
        with:
          fields: rest.fields
          exclude_fields: rest.exclude_fields
          batch_id: rest.batch_id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletebatchesid
        description: Mailchimp Delete Batch Request
        call: marketing-batches.deletebatchesid
        with:
          batch_id: rest.batch_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-batches-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mailchimp Marketing API  — Batches. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: mailchimp-list-batch-requests
      description: Mailchimp List Batch Requests
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-batches.getbatches
      with:
        fields: tools.fields
        exclude_fields: tools.exclude_fields
        count: tools.count
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: mailchimp-start-batch-operation
      description: Mailchimp Start Batch Operation
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-batches.postbatches
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: mailchimp-get-batch-operation-status
      description: Mailchimp Get Batch Operation Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-batches.getbatchesid
      with:
        fields: tools.fields
        exclude_fields: tools.exclude_fields
        batch_id: tools.batch_id
      outputParameters:
      - type: object
        mapping: $.
    - name: mailchimp-delete-batch-request
      description: Mailchimp Delete Batch Request
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: marketing-batches.deletebatchesid
      with:
        batch_id: tools.batch_id
      outputParameters:
      - type: object
        mapping: $.
