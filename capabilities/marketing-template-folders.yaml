naftiko: 1.0.0-alpha2
info:
  label: Mailchimp Marketing API  — Template Folders
  description: 'Mailchimp Marketing API  — Template Folders. 3 operations. Lead operation: Mailchimp Get Template Folder.
    Self-contained Naftiko capability covering one Mailchimp business surface.'
  tags:
  - Mailchimp
  - Template Folders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MAILCHIMP_API_KEY: MAILCHIMP_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-template-folders
    baseUri: https://server.api.mailchimp.com/3.0
    description: Mailchimp Marketing API  — Template Folders business capability. Self-contained, no shared references.
    resources:
    - name: template-folders-folder_id
      path: /template-folders/{folder_id}
      operations:
      - name: gettemplatefoldersid
        method: GET
        description: Mailchimp Get Template Folder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: A comma-separated list of fields to return. Reference parameters of sub-objects with dot notation.
        - name: exclude_fields
          in: query
          type: array
          description: A comma-separated list of fields to exclude. Reference parameters of sub-objects with dot notation.
        - name: folder_id
          in: path
          type: string
          description: The unique id for the template folder.
          required: true
      - name: patchtemplatefoldersid
        method: PATCH
        description: Mailchimp Update Template Folder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: folder_id
          in: path
          type: string
          description: The unique id for the template folder.
          required: true
        - name: body
          in: body
          type: object
          required: true
      - name: deletetemplatefoldersid
        method: DELETE
        description: Mailchimp Delete Template Folder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: folder_id
          in: path
          type: string
          description: The unique id for the template folder.
          required: true
  exposes:
  - type: rest
    namespace: marketing-template-folders-rest
    port: 8080
    description: REST adapter for Mailchimp Marketing API  — Template Folders. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/template-folders/{folder-id}
      name: template-folders-folder-id
      description: REST surface for template-folders-folder_id.
      operations:
      - method: GET
        name: gettemplatefoldersid
        description: Mailchimp Get Template Folder
        call: marketing-template-folders.gettemplatefoldersid
        with:
          fields: rest.fields
          exclude_fields: rest.exclude_fields
          folder_id: rest.folder_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patchtemplatefoldersid
        description: Mailchimp Update Template Folder
        call: marketing-template-folders.patchtemplatefoldersid
        with:
          folder_id: rest.folder_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletetemplatefoldersid
        description: Mailchimp Delete Template Folder
        call: marketing-template-folders.deletetemplatefoldersid
        with:
          folder_id: rest.folder_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-template-folders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mailchimp Marketing API  — Template Folders. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: mailchimp-get-template-folder
      description: Mailchimp Get Template Folder
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-template-folders.gettemplatefoldersid
      with:
        fields: tools.fields
        exclude_fields: tools.exclude_fields
        folder_id: tools.folder_id
      outputParameters:
      - type: object
        mapping: $.
    - name: mailchimp-update-template-folder
      description: Mailchimp Update Template Folder
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: marketing-template-folders.patchtemplatefoldersid
      with:
        folder_id: tools.folder_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: mailchimp-delete-template-folder
      description: Mailchimp Delete Template Folder
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: marketing-template-folders.deletetemplatefoldersid
      with:
        folder_id: tools.folder_id
      outputParameters:
      - type: object
        mapping: $.
