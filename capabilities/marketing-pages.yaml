naftiko: 1.0.0-alpha2
info:
  label: Mailchimp Marketing API  — Pages
  description: 'Mailchimp Marketing API  — Pages. 10 operations. Lead operation: Mailchimp List Landing Pages. Self-contained
    Naftiko capability covering one Mailchimp business surface.'
  tags:
  - Mailchimp
  - Pages
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MAILCHIMP_API_KEY: MAILCHIMP_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-pages
    baseUri: https://server.api.mailchimp.com/3.0
    description: Mailchimp Marketing API  — Pages business capability. Self-contained, no shared references.
    resources:
    - name: landing-pages
      path: /landing-pages
      operations:
      - name: getalllandingpages
        method: GET
        description: Mailchimp List Landing Pages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sort_dir
          in: query
          type: string
          description: Determines the order direction for sorted results.
        - name: sort_field
          in: query
          type: string
          description: Returns files sorted by the specified field.
        - name: fields
          in: query
          type: array
          description: A comma-separated list of fields to return. Reference parameters of sub-objects with dot notation.
        - name: exclude_fields
          in: query
          type: array
          description: A comma-separated list of fields to exclude. Reference parameters of sub-objects with dot notation.
        - name: count
          in: query
          type: integer
          description: The number of records to return. Default value is 10. Maximum value is 1000
      - name: postalllandingpages
        method: POST
        description: Mailchimp Add Landing Page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
        - name: use_default_list
          in: query
          type: boolean
          description: Will create the Landing Page using the account's Default List instead of requiring a list_id.
    - name: landing-pages-page_id
      path: /landing-pages/{page_id}
      operations:
      - name: getlandingpageid
        method: GET
        description: Mailchimp Get Landing Page Info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: A comma-separated list of fields to return. Reference parameters of sub-objects with dot notation.
        - name: exclude_fields
          in: query
          type: array
          description: A comma-separated list of fields to exclude. Reference parameters of sub-objects with dot notation.
        - name: page_id
          in: path
          type: string
          description: The unique id for the page.
          required: true
      - name: patchlandingpageid
        method: PATCH
        description: Mailchimp Update Landing Page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page_id
          in: path
          type: string
          description: The unique id for the page.
          required: true
        - name: body
          in: body
          type: object
          required: true
      - name: deletelandingpageid
        method: DELETE
        description: Mailchimp Delete Landing Page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page_id
          in: path
          type: string
          description: The unique id for the page.
          required: true
    - name: landing-pages-page_id-actions-publish
      path: /landing-pages/{page_id}/actions/publish
      operations:
      - name: postlandingpageidactionspublish
        method: POST
        description: Mailchimp Publish Landing Page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page_id
          in: path
          type: string
          description: The unique id for the page.
          required: true
    - name: landing-pages-page_id-actions-unpublish
      path: /landing-pages/{page_id}/actions/unpublish
      operations:
      - name: postlandingpageidactionsunpublish
        method: POST
        description: Mailchimp Unpublish Landing Page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
