naftiko: 1.0.0-alpha2
info:
  label: Mailchimp Marketing API  — Authorized
  description: 'Mailchimp Marketing API  — Authorized. 2 operations. Lead operation: Mailchimp List Authorized Apps. Self-contained
    Naftiko capability covering one Mailchimp business surface.'
  tags:
  - Mailchimp
  - Authorized
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MAILCHIMP_API_KEY: MAILCHIMP_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-authorized
    baseUri: https://server.api.mailchimp.com/3.0
    description: Mailchimp Marketing API  — Authorized business capability. Self-contained, no shared references.
    resources:
    - name: authorized-apps
      path: /authorized-apps
      operations:
      - name: getauthorizedapps
        method: GET
        description: Mailchimp List Authorized Apps
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: A comma-separated list of fields to return. Reference parameters of sub-objects with dot notation.
        - name: exclude_fields
          in: query
          type: array
          description: A comma-separated list of fields to exclude. Reference parameters of sub-objects with dot notation.
        - name: count
          in: query
          type: integer
          description: The number of records to return. Default value is 10. Maximum value is 1000
        - name: offset
          in: query
          type: integer
          description: Used for [pagination](https://mailchimp.com/developer/marketing/docs/methods-parameters/#pagination),
            this it the number of records from a collection to skip. D
    - name: authorized-apps-app_id
      path: /authorized-apps/{app_id}
      operations:
      - name: getauthorizedappsid
        method: GET
        description: Mailchimp Get Authorized App Info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: A comma-separated list of fields to return. Reference parameters of sub-objects with dot notation.
        - name: exclude_fields
          in: query
          type: array
          description: A comma-separated list of fields to exclude. Reference parameters of sub-objects with dot notation.
        - name: app_id
          in: path
          type: string
          description: The unique id for the connected authorized application.
          required: true
  exposes:
  - type: rest
    namespace: marketing-authorized-rest
    port: 8080
    description: REST adapter for Mailchimp Marketing API  — Authorized. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/authorized-apps
      name: authorized-apps
      description: REST surface for authorized-apps.
      operations:
      - method: GET
        name: getauthorizedapps
        description: Mailchimp List Authorized Apps
        call: marketing-authorized.getauthorizedapps
        with:
          fields: rest.fields
          exclude_fields: rest.exclude_fields
          count: rest.count
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/authorized-apps/{app-id}
      name: authorized-apps-app-id
      description: REST surface for authorized-apps-app_id.
      operations:
      - method: GET
        name: getauthorizedappsid
        description: Mailchimp Get Authorized App Info
        call: marketing-authorized.getauthorizedappsid
        with:
          fields: rest.fields
          exclude_fields: rest.exclude_fields
          app_id: rest.app_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-authorized-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mailchimp Marketing API  — Authorized. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: mailchimp-list-authorized-apps
      description: Mailchimp List Authorized Apps
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-authorized.getauthorizedapps
      with:
        fields: tools.fields
        exclude_fields: tools.exclude_fields
        count: tools.count
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: mailchimp-get-authorized-app-info
      description: Mailchimp Get Authorized App Info
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-authorized.getauthorizedappsid
      with:
        fields: tools.fields
        exclude_fields: tools.exclude_fields
        app_id: tools.app_id
      outputParameters:
      - type: object
        mapping: $.
