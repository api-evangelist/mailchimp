naftiko: 1.0.0-alpha2
info:
  label: Mailchimp Marketing API  — Connected_site_id
  description: 'Mailchimp Marketing API  — Connected_site_id. 3 operations. Lead operation: Mailchimp Get Connected Site.
    Self-contained Naftiko capability covering one Mailchimp business surface.'
  tags:
  - Mailchimp
  - Connected_site_id
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MAILCHIMP_API_KEY: MAILCHIMP_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-connected-site-id
    baseUri: https://server.api.mailchimp.com/3.0
    description: Mailchimp Marketing API  — Connected_site_id business capability. Self-contained, no shared references.
    resources:
    - name: connected-sites-connected_site_id
      path: /connected-sites/{connected_site_id}
      operations:
      - name: getconnectedsitesid
        method: GET
        description: Mailchimp Get Connected Site
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: A comma-separated list of fields to return. Reference parameters of sub-objects with dot notation.
        - name: exclude_fields
          in: query
          type: array
          description: A comma-separated list of fields to exclude. Reference parameters of sub-objects with dot notation.
        - name: connected_site_id
          in: path
          type: string
          description: The unique identifier for the site.
          required: true
      - name: deleteconnectedsitesid
        method: DELETE
        description: Mailchimp Delete Connected Site
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: connected_site_id
          in: path
          type: string
          description: The unique identifier for the site.
          required: true
    - name: connected-sites-connected_site_id-actions-verify-script-installation
      path: /connected-sites/{connected_site_id}/actions/verify-script-installation
      operations:
      - name: postconnectedsitesidactionsverifyscriptinstallation
        method: POST
        description: Mailchimp Verify Connected Site Script
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: connected_site_id
          in: path
          type: string
          description: The unique identifier for the site.
          required: true
  exposes:
  - type: rest
    namespace: marketing-connected-site-id-rest
    port: 8080
    description: REST adapter for Mailchimp Marketing API  — Connected_site_id. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/connected-sites/{connected-site-id}
      name: connected-sites-connected-site-id
      description: REST surface for connected-sites-connected_site_id.
      operations:
      - method: GET
        name: getconnectedsitesid
        description: Mailchimp Get Connected Site
        call: marketing-connected-site-id.getconnectedsitesid
        with:
          fields: rest.fields
          exclude_fields: rest.exclude_fields
          connected_site_id: rest.connected_site_id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteconnectedsitesid
        description: Mailchimp Delete Connected Site
        call: marketing-connected-site-id.deleteconnectedsitesid
        with:
          connected_site_id: rest.connected_site_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/connected-sites/{connected-site-id}/actions/verify-script-installation
      name: connected-sites-connected-site-id-actions-verify-script-installation
      description: REST surface for connected-sites-connected_site_id-actions-verify-script-installation.
      operations:
      - method: POST
        name: postconnectedsitesidactionsverifyscriptinstallation
        description: Mailchimp Verify Connected Site Script
        call: marketing-connected-site-id.postconnectedsitesidactionsverifyscriptinstallation
        with:
          connected_site_id: rest.connected_site_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-connected-site-id-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mailchimp Marketing API  — Connected_site_id. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: mailchimp-get-connected-site
      description: Mailchimp Get Connected Site
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-connected-site-id.getconnectedsitesid
      with:
        fields: tools.fields
        exclude_fields: tools.exclude_fields
        connected_site_id: tools.connected_site_id
      outputParameters:
      - type: object
        mapping: $.
    - name: mailchimp-delete-connected-site
      description: Mailchimp Delete Connected Site
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: marketing-connected-site-id.deleteconnectedsitesid
      with:
        connected_site_id: tools.connected_site_id
      outputParameters:
      - type: object
        mapping: $.
    - name: mailchimp-verify-connected-site-script
      description: Mailchimp Verify Connected Site Script
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-connected-site-id.postconnectedsitesidactionsverifyscriptinstallation
      with:
        connected_site_id: tools.connected_site_id
      outputParameters:
      - type: object
        mapping: $.
