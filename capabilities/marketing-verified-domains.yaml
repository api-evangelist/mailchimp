naftiko: 1.0.0-alpha2
info:
  label: Mailchimp Marketing API  — Verified Domains
  description: 'Mailchimp Marketing API  — Verified Domains. 2 operations. Lead operation: Mailchimp Get Domain Info. Self-contained
    Naftiko capability covering one Mailchimp business surface.'
  tags:
  - Mailchimp
  - Verified Domains
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MAILCHIMP_API_KEY: MAILCHIMP_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-verified-domains
    baseUri: https://server.api.mailchimp.com/3.0
    description: Mailchimp Marketing API  — Verified Domains business capability. Self-contained, no shared references.
    resources:
    - name: verified-domains-domain_name
      path: /verified-domains/{domain_name}
      operations:
      - name: getverifieddomain
        method: GET
        description: Mailchimp Get Domain Info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domain_name
          in: path
          type: string
          description: The domain name.
          required: true
      - name: deleteverifieddomain
        method: DELETE
        description: Mailchimp Delete Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domain_name
          in: path
          type: string
          description: The domain name.
          required: true
  exposes:
  - type: rest
    namespace: marketing-verified-domains-rest
    port: 8080
    description: REST adapter for Mailchimp Marketing API  — Verified Domains. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/verified-domains/{domain-name}
      name: verified-domains-domain-name
      description: REST surface for verified-domains-domain_name.
      operations:
      - method: GET
        name: getverifieddomain
        description: Mailchimp Get Domain Info
        call: marketing-verified-domains.getverifieddomain
        with:
          domain_name: rest.domain_name
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteverifieddomain
        description: Mailchimp Delete Domain
        call: marketing-verified-domains.deleteverifieddomain
        with:
          domain_name: rest.domain_name
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-verified-domains-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mailchimp Marketing API  — Verified Domains. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: mailchimp-get-domain-info
      description: Mailchimp Get Domain Info
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-verified-domains.getverifieddomain
      with:
        domain_name: tools.domain_name
      outputParameters:
      - type: object
        mapping: $.
    - name: mailchimp-delete-domain
      description: Mailchimp Delete Domain
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: marketing-verified-domains.deleteverifieddomain
      with:
        domain_name: tools.domain_name
      outputParameters:
      - type: object
        mapping: $.
