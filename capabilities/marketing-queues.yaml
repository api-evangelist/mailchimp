naftiko: 1.0.0-alpha2
info:
  label: Mailchimp Marketing API  — Queues
  description: 'Mailchimp Marketing API  — Queues. 3 operations. Lead operation: Mailchimp List Automated Email Subscribers.
    Self-contained Naftiko capability covering one Mailchimp business surface.'
  tags:
  - Mailchimp
  - Queues
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MAILCHIMP_API_KEY: MAILCHIMP_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-queues
    baseUri: https://server.api.mailchimp.com/3.0
    description: Mailchimp Marketing API  — Queues business capability. Self-contained, no shared references.
    resources:
    - name: automations-workflow_id-emails-workflow_email_id-queue
      path: /automations/{workflow_id}/emails/{workflow_email_id}/queue
      operations:
      - name: getautomationsidemailsidqueue
        method: GET
        description: Mailchimp List Automated Email Subscribers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workflow_id
          in: path
          type: string
          description: The unique id for the Automation workflow.
          required: true
        - name: workflow_email_id
          in: path
          type: string
          description: The unique id for the Automation workflow email.
          required: true
      - name: postautomationsidemailsidqueue
        method: POST
        description: Mailchimp Add Subscriber to Workflow Email
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workflow_id
          in: path
          type: string
          description: The unique id for the Automation workflow.
          required: true
        - name: workflow_email_id
          in: path
          type: string
          description: The unique id for the Automation workflow email.
          required: true
        - name: body
          in: body
          type: object
          required: true
    - name: automations-workflow_id-emails-workflow_email_id-queue-subscriber_hash
      path: /automations/{workflow_id}/emails/{workflow_email_id}/queue/{subscriber_hash}
      operations:
      - name: getautomationsidemailsidqueueid
        method: GET
        description: Mailchimp Get Automated Email Subscriber
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workflow_id
          in: path
          type: string
          description: The unique id for the Automation workflow.
          required: true
        - name: workflow_email_id
          in: path
          type: string
          description: The unique id for the Automation workflow email.
          required: true
        - name: subscriber_hash
          in: path
          type: string
          description: The MD5 hash of the lowercase version of the list member's email address.
          required: true
  exposes:
  - type: rest
    namespace: marketing-queues-rest
    port: 8080
    description: REST adapter for Mailchimp Marketing API  — Queues. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/automations/{workflow-id}/emails/{workflow-email-id}/queue
      name: automations-workflow-id-emails-workflow-email-id-queue
      description: REST surface for automations-workflow_id-emails-workflow_email_id-queue.
      operations:
      - method: GET
        name: getautomationsidemailsidqueue
        description: Mailchimp List Automated Email Subscribers
        call: marketing-queues.getautomationsidemailsidqueue
        with:
          workflow_id: rest.workflow_id
          workflow_email_id: rest.workflow_email_id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: postautomationsidemailsidqueue
        description: Mailchimp Add Subscriber to Workflow Email
        call: marketing-queues.postautomationsidemailsidqueue
        with:
          workflow_id: rest.workflow_id
          workflow_email_id: rest.workflow_email_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/automations/{workflow-id}/emails/{workflow-email-id}/queue/{subscriber-hash}
      name: automations-workflow-id-emails-workflow-email-id-queue-subscriber-hash
      description: REST surface for automations-workflow_id-emails-workflow_email_id-queue-subscriber_hash.
      operations:
      - method: GET
        name: getautomationsidemailsidqueueid
        description: Mailchimp Get Automated Email Subscriber
        call: marketing-queues.getautomationsidemailsidqueueid
        with:
          workflow_id: rest.workflow_id
          workflow_email_id: rest.workflow_email_id
          subscriber_hash: rest.subscriber_hash
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-queues-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mailchimp Marketing API  — Queues. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: mailchimp-list-automated-email-subscribers
      description: Mailchimp List Automated Email Subscribers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-queues.getautomationsidemailsidqueue
      with:
        workflow_id: tools.workflow_id
        workflow_email_id: tools.workflow_email_id
      outputParameters:
      - type: object
        mapping: $.
    - name: mailchimp-add-subscriber-workflow-email
      description: Mailchimp Add Subscriber to Workflow Email
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-queues.postautomationsidemailsidqueue
      with:
        workflow_id: tools.workflow_id
        workflow_email_id: tools.workflow_email_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: mailchimp-get-automated-email-subscriber
      description: Mailchimp Get Automated Email Subscriber
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-queues.getautomationsidemailsidqueueid
      with:
        workflow_id: tools.workflow_id
        workflow_email_id: tools.workflow_email_id
        subscriber_hash: tools.subscriber_hash
      outputParameters:
      - type: object
        mapping: $.
