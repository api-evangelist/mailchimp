naftiko: 1.0.0-alpha2
info:
  label: Mailchimp Marketing API  — Goals
  description: 'Mailchimp Marketing API  — Goals. 1 operations. Lead operation: Mailchimp List Member Goal Events. Self-contained
    Naftiko capability covering one Mailchimp business surface.'
  tags:
  - Mailchimp
  - Goals
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MAILCHIMP_API_KEY: MAILCHIMP_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-goals
    baseUri: https://server.api.mailchimp.com/3.0
    description: Mailchimp Marketing API  — Goals business capability. Self-contained, no shared references.
    resources:
    - name: lists-list_id-members-subscriber_hash-goals
      path: /lists/{list_id}/members/{subscriber_hash}/goals
      operations:
      - name: getlistsidmembersidgoals
        method: GET
        description: Mailchimp List Member Goal Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: list_id
          in: path
          type: string
          description: The unique ID for the list.
          required: true
        - name: subscriber_hash
          in: path
          type: string
          description: The MD5 hash of the lowercase version of the list member's email address. This endpoint also accepts
            a list member's email address or contact_id.
          required: true
        - name: fields
          in: query
          type: array
          description: A comma-separated list of fields to return. Reference parameters of sub-objects with dot notation.
        - name: exclude_fields
          in: query
          type: array
          description: A comma-separated list of fields to exclude. Reference parameters of sub-objects with dot notation.
  exposes:
  - type: rest
    namespace: marketing-goals-rest
    port: 8080
    description: REST adapter for Mailchimp Marketing API  — Goals. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/lists/{list-id}/members/{subscriber-hash}/goals
      name: lists-list-id-members-subscriber-hash-goals
      description: REST surface for lists-list_id-members-subscriber_hash-goals.
      operations:
      - method: GET
        name: getlistsidmembersidgoals
        description: Mailchimp List Member Goal Events
        call: marketing-goals.getlistsidmembersidgoals
        with:
          list_id: rest.list_id
          subscriber_hash: rest.subscriber_hash
          fields: rest.fields
          exclude_fields: rest.exclude_fields
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-goals-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mailchimp Marketing API  — Goals. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: mailchimp-list-member-goal-events
      description: Mailchimp List Member Goal Events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-goals.getlistsidmembersidgoals
      with:
        list_id: tools.list_id
        subscriber_hash: tools.subscriber_hash
        fields: tools.fields
        exclude_fields: tools.exclude_fields
      outputParameters:
      - type: object
        mapping: $.
