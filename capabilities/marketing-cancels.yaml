naftiko: 1.0.0-alpha2
info:
  label: Mailchimp Marketing API  — Cancels
  description: 'Mailchimp Marketing API  — Cancels. 1 operations. Lead operation: Mailchimp Cancel Campaign. Self-contained
    Naftiko capability covering one Mailchimp business surface.'
  tags:
  - Mailchimp
  - Cancels
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MAILCHIMP_API_KEY: MAILCHIMP_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-cancels
    baseUri: https://server.api.mailchimp.com/3.0
    description: Mailchimp Marketing API  — Cancels business capability. Self-contained, no shared references.
    resources:
    - name: campaigns-campaign_id-actions-cancel-send
      path: /campaigns/{campaign_id}/actions/cancel-send
      operations:
      - name: postcampaignsidactionscancelsend
        method: POST
        description: Mailchimp Cancel Campaign
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: campaign_id
          in: path
          type: string
          description: The unique id for the campaign.
          required: true
  exposes:
  - type: rest
    namespace: marketing-cancels-rest
    port: 8080
    description: REST adapter for Mailchimp Marketing API  — Cancels. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/campaigns/{campaign-id}/actions/cancel-send
      name: campaigns-campaign-id-actions-cancel-send
      description: REST surface for campaigns-campaign_id-actions-cancel-send.
      operations:
      - method: POST
        name: postcampaignsidactionscancelsend
        description: Mailchimp Cancel Campaign
        call: marketing-cancels.postcampaignsidactionscancelsend
        with:
          campaign_id: rest.campaign_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-cancels-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mailchimp Marketing API  — Cancels. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: mailchimp-cancel-campaign
      description: Mailchimp Cancel Campaign
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-cancels.postcampaignsidactionscancelsend
      with:
        campaign_id: tools.campaign_id
      outputParameters:
      - type: object
        mapping: $.
