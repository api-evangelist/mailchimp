naftiko: 1.0.0-alpha2
info:
  label: Mailchimp Marketing API  — Outreach_id
  description: 'Mailchimp Marketing API  — Outreach_id. 3 operations. Lead operation: Mailchimp Get Facebook Ad Info. Self-contained
    Naftiko capability covering one Mailchimp business surface.'
  tags:
  - Mailchimp
  - Outreach_id
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MAILCHIMP_API_KEY: MAILCHIMP_API_KEY
capability:
