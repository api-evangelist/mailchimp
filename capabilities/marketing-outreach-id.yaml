  - type: http
    namespace: marketing-outreach-id
    baseUri: https://server.api.mailchimp.com/3.0
    description: Mailchimp Marketing API  — Outreach_id business capability. Self-contained, no shared references.
    resources:
    - name: facebook-ads-outreach_id
      path: /facebook-ads/{outreach_id}
      operations:
      - name: getfacebookadsid
        method: GET
        description: Mailchimp Get Facebook Ad Info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: A comma-separated list of fields to return. Reference parameters of sub-objects with dot notation.
        - name: outreach_id
          in: path
          type: string
          description: The outreach id.
          required: true
        - name: exclude_fields
          in: query
          type: array
          description: A comma-separated list of fields to exclude. Reference parameters of sub-objects with dot notation.
    - name: reporting-facebook-ads-outreach_id
      path: /reporting/facebook-ads/{outreach_id}
      operations:
      - name: getreportingfacebookadsid
        method: GET
        description: Mailchimp Get Facebook Ad Report
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: A comma-separated list of fields to return. Reference parameters of sub-objects with dot notation.
        - name: outreach_id
          in: path
          type: string
          description: The outreach id.
          required: true
        - name: exclude_fields
          in: query
          type: array
          description: A comma-separated list of fields to exclude. Reference parameters of sub-objects with dot notation.
    - name: reporting-facebook-ads-outreach_id-ecommerce-product-activity
      path: /reporting/facebook-ads/{outreach_id}/ecommerce-product-activity
      operations:
      - name: getreportingfacebookadsidecommerceproductactivity
        method: GET
        description: Mailchimp List Facebook Ecommerce Report
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: A comma-separated list of fields to return. Reference parameters of sub-objects with dot notation.
        - name: exclude_fields
          in: query
          type: array
          description: A comma-separated list of fields to exclude. Reference parameters of sub-objects with dot notation.
        - name: count
          in: query
          type: integer
          description: The number of records to return. Default value is 10. Maximum value is 1000
        - name: offset
          in: query
          type: integer
          description: Used for [pagination](https://mailchimp.com/developer/marketing/docs/methods-parameters/#pagination),
            this it the number of records from a collection to skip. D
        - name: outreach_id
          in: path
          type: string
          description: The outreach id.
          required: true
        - name: sort_field
          in: query
          type: string
          description: Returns files sorted by the specified field.
  exposes:
  - type: rest
    namespace: marketing-outreach-id-rest
    port: 8080
    description: REST adapter for Mailchimp Marketing API  — Outreach_id. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/facebook-ads/{outreach-id}
      name: facebook-ads-outreach-id
      description: REST surface for facebook-ads-outreach_id.
      operations:
      - method: GET
        name: getfacebookadsid
        description: Mailchimp Get Facebook Ad Info
        call: marketing-outreach-id.getfacebookadsid
        with:
          fields: rest.fields
          outreach_id: rest.outreach_id
          exclude_fields: rest.exclude_fields
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/reporting/facebook-ads/{outreach-id}
      name: reporting-facebook-ads-outreach-id
      description: REST surface for reporting-facebook-ads-outreach_id.
      operations:
      - method: GET
        name: getreportingfacebookadsid
        description: Mailchimp Get Facebook Ad Report
        call: marketing-outreach-id.getreportingfacebookadsid
        with:
          fields: rest.fields
          outreach_id: rest.outreach_id
          exclude_fields: rest.exclude_fields
        outputParameters:
        - type: object
          mapping: $.
