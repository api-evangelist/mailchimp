      name: reporting-facebook-ads-outreach-id-ecommerce-product-activity
      description: REST surface for reporting-facebook-ads-outreach_id-ecommerce-product-activity.
      operations:
      - method: GET
        name: getreportingfacebookadsidecommerceproductactivity
        description: Mailchimp List Facebook Ecommerce Report
        call: marketing-outreach-id.getreportingfacebookadsidecommerceproductactivity
        with:
          fields: rest.fields
          exclude_fields: rest.exclude_fields
          count: rest.count
          offset: rest.offset
          outreach_id: rest.outreach_id
          sort_field: rest.sort_field
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-outreach-id-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mailchimp Marketing API  — Outreach_id. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: mailchimp-get-facebook-ad-info
      description: Mailchimp Get Facebook Ad Info
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-outreach-id.getfacebookadsid
      with:
        fields: tools.fields
        outreach_id: tools.outreach_id
        exclude_fields: tools.exclude_fields
      outputParameters:
      - type: object
        mapping: $.
    - name: mailchimp-get-facebook-ad-report
      description: Mailchimp Get Facebook Ad Report
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-outreach-id.getreportingfacebookadsid
      with:
        fields: tools.fields
        outreach_id: tools.outreach_id
        exclude_fields: tools.exclude_fields
      outputParameters:
      - type: object
        mapping: $.
    - name: mailchimp-list-facebook-ecommerce-report
      description: Mailchimp List Facebook Ecommerce Report
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-outreach-id.getreportingfacebookadsidecommerceproductactivity
      with:
        fields: tools.fields
        exclude_fields: tools.exclude_fields
