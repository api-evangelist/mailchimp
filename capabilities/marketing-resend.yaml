naftiko: 1.0.0-alpha2
info:
  label: Mailchimp Marketing API  — Resend
  description: 'Mailchimp Marketing API  — Resend. 1 operations. Lead operation: Mailchimp Resend Campaign. Self-contained
    Naftiko capability covering one Mailchimp business surface.'
  tags:
  - Mailchimp
  - Resend
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MAILCHIMP_API_KEY: MAILCHIMP_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-resend
    baseUri: https://server.api.mailchimp.com/3.0
    description: Mailchimp Marketing API  — Resend business capability. Self-contained, no shared references.
    resources:
    - name: campaigns-campaign_id-actions-create-resend
      path: /campaigns/{campaign_id}/actions/create-resend
      operations:
      - name: postcampaignsidactionscreateresend
        method: POST
        description: Mailchimp Resend Campaign
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: campaign_id
          in: path
          type: string
          description: The unique id for the campaign.
          required: true
        - name: body
          in: body
          type: object
  exposes:
  - type: rest
    namespace: marketing-resend-rest
    port: 8080
    description: REST adapter for Mailchimp Marketing API  — Resend. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/campaigns/{campaign-id}/actions/create-resend
      name: campaigns-campaign-id-actions-create-resend
      description: REST surface for campaigns-campaign_id-actions-create-resend.
      operations:
      - method: POST
        name: postcampaignsidactionscreateresend
        description: Mailchimp Resend Campaign
        call: marketing-resend.postcampaignsidactionscreateresend
        with:
          campaign_id: rest.campaign_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-resend-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mailchimp Marketing API  — Resend. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: mailchimp-resend-campaign
      description: Mailchimp Resend Campaign
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-resend.postcampaignsidactionscreateresend
      with:
        campaign_id: tools.campaign_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
