naftiko: 1.0.0-alpha2
info:
  label: Mailchimp Marketing API  — Eepurl
  description: 'Mailchimp Marketing API  — Eepurl. 1 operations. Lead operation: Mailchimp List Eepurl Activity. Self-contained
    Naftiko capability covering one Mailchimp business surface.'
  tags:
  - Mailchimp
  - Eepurl
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MAILCHIMP_API_KEY: MAILCHIMP_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-eepurl
    baseUri: https://server.api.mailchimp.com/3.0
    description: Mailchimp Marketing API  — Eepurl business capability. Self-contained, no shared references.
    resources:
    - name: reports-campaign_id-eepurl
      path: /reports/{campaign_id}/eepurl
      operations:
      - name: getreportsideepurl
        method: GET
        description: Mailchimp List Eepurl Activity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: A comma-separated list of fields to return. Reference parameters of sub-objects with dot notation.
        - name: exclude_fields
          in: query
          type: array
          description: A comma-separated list of fields to exclude. Reference parameters of sub-objects with dot notation.
        - name: campaign_id
          in: path
          type: string
          description: The unique id for the campaign.
          required: true
  exposes:
  - type: rest
    namespace: marketing-eepurl-rest
    port: 8080
    description: REST adapter for Mailchimp Marketing API  — Eepurl. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/reports/{campaign-id}/eepurl
      name: reports-campaign-id-eepurl
      description: REST surface for reports-campaign_id-eepurl.
      operations:
      - method: GET
        name: getreportsideepurl
        description: Mailchimp List Eepurl Activity
        call: marketing-eepurl.getreportsideepurl
        with:
          fields: rest.fields
          exclude_fields: rest.exclude_fields
          campaign_id: rest.campaign_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-eepurl-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mailchimp Marketing API  — Eepurl. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: mailchimp-list-eepurl-activity
      description: Mailchimp List Eepurl Activity
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-eepurl.getreportsideepurl
      with:
        fields: tools.fields
        exclude_fields: tools.exclude_fields
        campaign_id: tools.campaign_id
      outputParameters:
      - type: object
        mapping: $.
