naftiko: "1.0.0-alpha1"

info:
  label: "Mailchimp Marketing API"
  description: "Marketing API for managing audiences, campaigns, automations, templates, reports, e-commerce stores, and more."
  tags:
    - Mailchimp
    - Email Marketing
    - Campaigns
    - Audiences
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      MAILCHIMP_API_KEY: MAILCHIMP_API_KEY

capability:
  consumes:
    - type: http
      namespace: marketing
      baseUri: https://server.api.mailchimp.com/3.0
      description: "Mailchimp Marketing API for email marketing and audience management."
      authentication:
        type: basic
        username: "anystring"
        password: "{{MAILCHIMP_API_KEY}}"
      resources:
        - name: campaigns
          path: /campaigns
          description: "Email campaign management."
          operations:
            - name: list-campaigns
              method: GET
              description: "List all campaigns."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-campaign
              method: POST
              description: "Create a new campaign."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  type: "{{tools.type}}"
                  recipients:
                    list_id: "{{tools.list_id}}"
                  settings:
                    subject_line: "{{tools.subject_line}}"
                    from_name: "{{tools.from_name}}"
                    reply_to: "{{tools.reply_to}}"
            - name: get-campaign
              method: GET
              description: "Get a specific campaign."
              inputParameters:
                - name: campaign_id
                  in: path
                  type: string
                  required: true
                  description: "Campaign ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-campaign
              method: PATCH
              description: "Update a campaign."
              inputParameters:
                - name: campaign_id
                  in: path
                  type: string
                  required: true
                  description: "Campaign ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-campaign
              method: DELETE
              description: "Delete a campaign."
              inputParameters:
                - name: campaign_id
                  in: path
                  type: string
                  required: true
                  description: "Campaign ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: send-campaign
              method: POST
              description: "Send a campaign."
              inputParameters:
                - name: campaign_id
                  in: path
                  type: string
                  required: true
                  description: "Campaign ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: schedule-campaign
              method: POST
              description: "Schedule a campaign."
              inputParameters:
                - name: campaign_id
                  in: path
                  type: string
                  required: true
                  description: "Campaign ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  schedule_time: "{{tools.schedule_time}}"

        - name: lists
          path: /lists
          description: "Audience/list management."
          operations:
            - name: list-audiences
              method: GET
              description: "List all audiences."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-audience
              method: POST
              description: "Create a new audience."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  permission_reminder: "{{tools.permission_reminder}}"
            - name: get-audience
              method: GET
              description: "Get a specific audience."
              inputParameters:
                - name: list_id
                  in: path
                  type: string
                  required: true
                  description: "List/Audience ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-members
              method: GET
              description: "List audience members."
              inputParameters:
                - name: list_id
                  in: path
                  type: string
                  required: true
                  description: "List ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: add-member
              method: POST
              description: "Add a member to an audience."
              inputParameters:
                - name: list_id
                  in: path
                  type: string
                  required: true
                  description: "List ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  email_address: "{{tools.email_address}}"
                  status: "{{tools.status}}"
            - name: get-member
              method: GET
              description: "Get a specific member."
              inputParameters:
                - name: list_id
                  in: path
                  type: string
                  required: true
                  description: "List ID"
                - name: subscriber_hash
                  in: path
                  type: string
                  required: true
                  description: "Subscriber hash (MD5 of lowercase email)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: automations
          path: /automations
          description: "Marketing automations."
          operations:
            - name: list-automations
              method: GET
              description: "List all automations."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-automation
              method: GET
              description: "Get a specific automation."
              inputParameters:
                - name: workflow_id
                  in: path
                  type: string
                  required: true
                  description: "Workflow ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: templates
          path: /templates
          description: "Email templates."
          operations:
            - name: list-templates
              method: GET
              description: "List all templates."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-template
              method: POST
              description: "Create a template."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  html: "{{tools.html}}"

        - name: reports
          path: /reports
          description: "Campaign reports and analytics."
          operations:
            - name: list-reports
              method: GET
              description: "List campaign reports."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-report
              method: GET
              description: "Get a specific campaign report."
              inputParameters:
                - name: campaign_id
                  in: path
                  type: string
                  required: true
                  description: "Campaign ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: marketing-api
      resources:
        - path: /v1/campaigns
          name: campaigns
          description: "Email campaigns."
          operations:
            - method: GET
              name: list-campaigns
              description: "List campaigns."
              call: "marketing.list-campaigns"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/audiences
          name: audiences
          description: "Audiences."
          operations:
            - method: GET
              name: list-audiences
              description: "List audiences."
              call: "marketing.list-audiences"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/reports
          name: reports
          description: "Campaign reports."
          operations:
            - method: GET
              name: list-reports
              description: "List reports."
              call: "marketing.list-reports"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: marketing-mcp
      transport: http
      tools:
        - name: list-campaigns
          description: "List all email campaigns."
          hints:
            readOnly: true
            openWorld: true
          call: "marketing.list-campaigns"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-campaign
          description: "Get a specific campaign."
          hints:
            readOnly: true
            idempotent: true
          call: "marketing.get-campaign"
          with:
            campaign_id: "tools.campaign_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-campaign
          description: "Create a new email campaign."
          hints:
            readOnly: false
          call: "marketing.create-campaign"
          with:
            type: "tools.type"
            list_id: "tools.list_id"
            subject_line: "tools.subject_line"
          outputParameters:
            - type: object
              mapping: "$."
        - name: send-campaign
          description: "Send a campaign immediately."
          hints:
            readOnly: false
          call: "marketing.send-campaign"
          with:
            campaign_id: "tools.campaign_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-campaign
          description: "Delete a campaign."
          hints:
            readOnly: false
            destructive: true
          call: "marketing.delete-campaign"
          with:
            campaign_id: "tools.campaign_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-audiences
          description: "List all audiences/lists."
          hints:
            readOnly: true
            openWorld: true
          call: "marketing.list-audiences"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-audience
          description: "Get audience details."
          hints:
            readOnly: true
            idempotent: true
          call: "marketing.get-audience"
          with:
            list_id: "tools.list_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-members
          description: "List members in an audience."
          hints:
            readOnly: true
          call: "marketing.list-members"
          with:
            list_id: "tools.list_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: add-member
          description: "Add a member to an audience."
          hints:
            readOnly: false
          call: "marketing.add-member"
          with:
            list_id: "tools.list_id"
            email_address: "tools.email_address"
            status: "tools.status"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-automations
          description: "List all marketing automations."
          hints:
            readOnly: true
          call: "marketing.list-automations"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-templates
          description: "List email templates."
          hints:
            readOnly: true
          call: "marketing.list-templates"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-reports
          description: "List campaign reports."
          hints:
            readOnly: true
          call: "marketing.list-reports"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-report
          description: "Get a specific campaign report."
          hints:
            readOnly: true
            idempotent: true
          call: "marketing.get-report"
          with:
            campaign_id: "tools.campaign_id"
          outputParameters:
            - type: object
              mapping: "$."
