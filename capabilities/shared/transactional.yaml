naftiko: "1.0.0-alpha1"

info:
  label: "Mailchimp Transactional API"
  description: "Transactional email delivery API (formerly Mandrill) for sending personalized one-to-one emails with templates, tags, webhooks, and delivery analytics."
  tags:
    - Mailchimp
    - Transactional Email
    - Email Delivery
    - Mandrill
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      MANDRILL_API_KEY: MANDRILL_API_KEY

capability:
  consumes:
    - type: http
      namespace: transactional
      baseUri: https://mandrillapp.com/api/1.0
      description: "Mailchimp Transactional API (Mandrill) for transactional email delivery."
      authentication:
        type: apikey
        key: key
        value: "{{MANDRILL_API_KEY}}"
        placement: body
      resources:
        - name: messages
          path: /messages
          description: "Send and manage transactional messages."
          operations:
            - name: send-message
              method: POST
              description: "Send a new transactional email."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  key: "{{MANDRILL_API_KEY}}"
                  message:
                    from_email: "{{tools.from_email}}"
                    to:
                      - email: "{{tools.to_email}}"
                    subject: "{{tools.subject}}"
                    html: "{{tools.html}}"

            - name: send-template-message
              method: POST
              description: "Send a transactional email using a template."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  key: "{{MANDRILL_API_KEY}}"
                  template_name: "{{tools.template_name}}"
                  message:
                    to:
                      - email: "{{tools.to_email}}"

            - name: search-messages
              method: POST
              description: "Search recently sent messages."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  key: "{{MANDRILL_API_KEY}}"
                  query: "{{tools.query}}"

            - name: get-message-info
              method: POST
              description: "Get information about a sent message."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  key: "{{MANDRILL_API_KEY}}"
                  id: "{{tools.message_id}}"

            - name: get-message-content
              method: POST
              description: "Get the full content of a sent message."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  key: "{{MANDRILL_API_KEY}}"
                  id: "{{tools.message_id}}"

        - name: templates
          path: /templates
          description: "Manage email templates."
          operations:
            - name: list-templates
              method: POST
              description: "List all templates."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  key: "{{MANDRILL_API_KEY}}"

            - name: get-template-info
              method: POST
              description: "Get information about a template."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  key: "{{MANDRILL_API_KEY}}"
                  name: "{{tools.template_name}}"

            - name: add-template
              method: POST
              description: "Add a new template."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  key: "{{MANDRILL_API_KEY}}"
                  name: "{{tools.name}}"
                  code: "{{tools.html}}"

        - name: tags
          path: /tags
          description: "Manage message tags."
          operations:
            - name: list-tags
              method: POST
              description: "List all tags."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  key: "{{MANDRILL_API_KEY}}"

            - name: get-tag-info
              method: POST
              description: "Get information about a tag."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  key: "{{MANDRILL_API_KEY}}"
                  tag: "{{tools.tag}}"

        - name: senders
          path: /senders
          description: "Manage sending domains and addresses."
          operations:
            - name: list-senders
              method: POST
              description: "List all senders."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  key: "{{MANDRILL_API_KEY}}"

        - name: users
          path: /users
          description: "Account information."
          operations:
            - name: get-user-info
              method: POST
              description: "Get account information."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  key: "{{MANDRILL_API_KEY}}"

        - name: webhooks
          path: /webhooks
          description: "Webhook management."
          operations:
            - name: list-webhooks
              method: POST
              description: "List all webhooks."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  key: "{{MANDRILL_API_KEY}}"

  exposes:
    - type: rest
      port: 8101
      namespace: transactional-api
      resources:
        - path: /v1/messages/send
          name: send
          description: "Send messages."
          operations:
            - method: POST
              name: send-message
              description: "Send a transactional email."
              call: "transactional.send-message"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/messages/search
          name: search
          description: "Search messages."
          operations:
            - method: POST
              name: search-messages
              description: "Search sent messages."
              call: "transactional.search-messages"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: transactional-mcp
      transport: http
      tools:
        - name: send-message
          description: "Send a transactional email."
          hints:
            readOnly: false
          call: "transactional.send-message"
          with:
            from_email: "tools.from_email"
            to_email: "tools.to_email"
            subject: "tools.subject"
            html: "tools.html"
          outputParameters:
            - type: object
              mapping: "$."
        - name: send-template-message
          description: "Send a transactional email using a template."
          hints:
            readOnly: false
          call: "transactional.send-template-message"
          with:
            template_name: "tools.template_name"
            to_email: "tools.to_email"
          outputParameters:
            - type: object
              mapping: "$."
        - name: search-messages
          description: "Search recently sent messages."
          hints:
            readOnly: true
          call: "transactional.search-messages"
          with:
            query: "tools.query"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-message-info
          description: "Get details about a sent message."
          hints:
            readOnly: true
            idempotent: true
          call: "transactional.get-message-info"
          with:
            message_id: "tools.message_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-message-content
          description: "Get the full content of a sent message."
          hints:
            readOnly: true
          call: "transactional.get-message-content"
          with:
            message_id: "tools.message_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-templates
          description: "List all transactional email templates."
          hints:
            readOnly: true
          call: "transactional.list-templates"
          outputParameters:
            - type: object
              mapping: "$."
        - name: add-template
          description: "Add a new email template."
          hints:
            readOnly: false
          call: "transactional.add-template"
          with:
            name: "tools.name"
            html: "tools.html"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-tags
          description: "List all message tags."
          hints:
            readOnly: true
          call: "transactional.list-tags"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-tag-info
          description: "Get information about a tag."
          hints:
            readOnly: true
          call: "transactional.get-tag-info"
          with:
            tag: "tools.tag"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-senders
          description: "List all sender addresses."
          hints:
            readOnly: true
          call: "transactional.list-senders"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-user-info
          description: "Get account information."
          hints:
            readOnly: true
          call: "transactional.get-user-info"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-webhooks
          description: "List all webhooks."
          hints:
            readOnly: true
          call: "transactional.list-webhooks"
          outputParameters:
            - type: object
              mapping: "$."
