naftiko: 1.0.0-alpha2
info:
  label: Mailchimp Marketing API  — File Manager
  description: 'Mailchimp Marketing API  — File Manager. 6 operations. Lead operation: Mailchimp Get File. Self-contained
    Naftiko capability covering one Mailchimp business surface.'
  tags:
  - Mailchimp
  - File Manager
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MAILCHIMP_API_KEY: MAILCHIMP_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-file-manager
    baseUri: https://server.api.mailchimp.com/3.0
    description: Mailchimp Marketing API  — File Manager business capability. Self-contained, no shared references.
    resources:
    - name: file-manager-files-file_id
      path: /file-manager/files/{file_id}
      operations:
      - name: getfilemanagerfilesid
        method: GET
        description: Mailchimp Get File
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: A comma-separated list of fields to return. Reference parameters of sub-objects with dot notation.
        - name: exclude_fields
          in: query
          type: array
          description: A comma-separated list of fields to exclude. Reference parameters of sub-objects with dot notation.
        - name: file_id
          in: path
          type: string
          description: The unique id for the File Manager file.
          required: true
      - name: patchfilemanagerfilesid
        method: PATCH
        description: Mailchimp Update File
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: file_id
          in: path
          type: string
          description: The unique id for the File Manager file.
          required: true
        - name: body
          in: body
          type: object
          required: true
      - name: deletefilemanagerfilesid
        method: DELETE
        description: Mailchimp Delete File
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: file_id
          in: path
          type: string
          description: The unique id for the File Manager file.
          required: true
    - name: file-manager-folders-folder_id
      path: /file-manager/folders/{folder_id}
      operations:
      - name: getfilemanagerfoldersid
        method: GET
        description: Mailchimp Get Folder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: A comma-separated list of fields to return. Reference parameters of sub-objects with dot notation.
        - name: exclude_fields
          in: query
          type: array
          description: A comma-separated list of fields to exclude. Reference parameters of sub-objects with dot notation.
        - name: folder_id
          in: path
          type: string
          description: The unique id for the File Manager folder.
          required: true
      - name: patchfilemanagerfoldersid
        method: PATCH
        description: Mailchimp Update Folder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: folder_id
          in: path
          type: string
          description: The unique id for the File Manager folder.
          required: true
        - name: body
          in: body
          type: object
          required: true
      - name: deletefilemanagerfoldersid
        method: DELETE
        description: Mailchimp Delete Folder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: folder_id
          in: path
          type: string
          description: The unique id for the File Manager folder.
          required: true
  exposes:
  - type: rest
    namespace: marketing-file-manager-rest
    port: 8080
    description: REST adapter for Mailchimp Marketing API  — File Manager. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/file-manager/files/{file-id}
      name: file-manager-files-file-id
      description: REST surface for file-manager-files-file_id.
      operations:
      - method: GET
        name: getfilemanagerfilesid
        description: Mailchimp Get File
        call: marketing-file-manager.getfilemanagerfilesid
        with:
          fields: rest.fields
          exclude_fields: rest.exclude_fields
          file_id: rest.file_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patchfilemanagerfilesid
        description: Mailchimp Update File
        call: marketing-file-manager.patchfilemanagerfilesid
        with:
          file_id: rest.file_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletefilemanagerfilesid
        description: Mailchimp Delete File
        call: marketing-file-manager.deletefilemanagerfilesid
        with:
          file_id: rest.file_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/file-manager/folders/{folder-id}
      name: file-manager-folders-folder-id
      description: REST surface for file-manager-folders-folder_id.
      operations:
      - method: GET
        name: getfilemanagerfoldersid
        description: Mailchimp Get Folder
        call: marketing-file-manager.getfilemanagerfoldersid
        with:
          fields: rest.fields
          exclude_fields: rest.exclude_fields
          folder_id: rest.folder_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: patchfilemanagerfoldersid
        description: Mailchimp Update Folder
        call: marketing-file-manager.patchfilemanagerfoldersid
        with:
          folder_id: rest.folder_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletefilemanagerfoldersid
        description: Mailchimp Delete Folder
        call: marketing-file-manager.deletefilemanagerfoldersid
        with:
          folder_id: rest.folder_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-file-manager-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mailchimp Marketing API  — File Manager. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: mailchimp-get-file
      description: Mailchimp Get File
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-file-manager.getfilemanagerfilesid
      with:
        fields: tools.fields
        exclude_fields: tools.exclude_fields
        file_id: tools.file_id
      outputParameters:
      - type: object
        mapping: $.
    - name: mailchimp-update-file
      description: Mailchimp Update File
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: marketing-file-manager.patchfilemanagerfilesid
      with:
        file_id: tools.file_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: mailchimp-delete-file
      description: Mailchimp Delete File
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: marketing-file-manager.deletefilemanagerfilesid
      with:
        file_id: tools.file_id
      outputParameters:
      - type: object
        mapping: $.
    - name: mailchimp-get-folder
      description: Mailchimp Get Folder
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-file-manager.getfilemanagerfoldersid
      with:
        fields: tools.fields
        exclude_fields: tools.exclude_fields
        folder_id: tools.folder_id
      outputParameters:
      - type: object
        mapping: $.
    - name: mailchimp-update-folder
      description: Mailchimp Update Folder
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: marketing-file-manager.patchfilemanagerfoldersid
      with:
        folder_id: tools.folder_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: mailchimp-delete-folder
      description: Mailchimp Delete Folder
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: marketing-file-manager.deletefilemanagerfoldersid
      with:
        folder_id: tools.folder_id
      outputParameters:
      - type: object
        mapping: $.
