naftiko: 1.0.0-alpha2
info:
  label: Mailchimp Marketing API  — Email
  description: 'Mailchimp Marketing API  — Email. 3 operations. Lead operation: Mailchimp Create a Survey Campaign. Self-contained
    Naftiko capability covering one Mailchimp business surface.'
  tags:
  - Mailchimp
  - Email
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MAILCHIMP_API_KEY: MAILCHIMP_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketing-email
    baseUri: https://server.api.mailchimp.com/3.0
    description: Mailchimp Marketing API  — Email business capability. Self-contained, no shared references.
    resources:
    - name: lists-list_id-surveys-survey_id-actions-create-email
      path: /lists/{list_id}/surveys/{survey_id}/actions/create-email
      operations:
      - name: postlistsidsurveysidactionscreateemail
        method: POST
        description: Mailchimp Create a Survey Campaign
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: list_id
          in: path
          type: string
          description: The unique ID for the list.
          required: true
        - name: survey_id
          in: path
          type: string
          description: The ID of the survey.
          required: true
    - name: reports-campaign_id-email-activity
      path: /reports/{campaign_id}/email-activity
      operations:
      - name: getreportsidemailactivity
        method: GET
        description: Mailchimp List Email Activity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: A comma-separated list of fields to return. Reference parameters of sub-objects with dot notation.
        - name: exclude_fields
          in: query
          type: array
          description: A comma-separated list of fields to exclude. Reference parameters of sub-objects with dot notation.
        - name: count
          in: query
          type: integer
          description: The number of records to return. Default value is 10. Maximum value is 1000
        - name: offset
          in: query
          type: integer
          description: Used for [pagination](https://mailchimp.com/developer/marketing/docs/methods-parameters/#pagination),
            this it the number of records from a collection to skip. D
        - name: campaign_id
          in: path
          type: string
          description: The unique id for the campaign.
          required: true
        - name: since
          in: query
          type: string
          description: 'Restrict results to email activity events that occur after a specific time. Uses ISO 8601 time format:
            2015-10-21T15:41:36+00:00.'
    - name: reports-campaign_id-email-activity-subscriber_hash
      path: /reports/{campaign_id}/email-activity/{subscriber_hash}
      operations:
      - name: getreportsidemailactivityid
        method: GET
        description: Mailchimp Get Subscriber Email Activity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: array
          description: A comma-separated list of fields to return. Reference parameters of sub-objects with dot notation.
        - name: exclude_fields
          in: query
          type: array
          description: A comma-separated list of fields to exclude. Reference parameters of sub-objects with dot notation.
        - name: campaign_id
          in: path
          type: string
          description: The unique id for the campaign.
          required: true
        - name: subscriber_hash
          in: path
          type: string
          description: The MD5 hash of the lowercase version of the list member's email address.
          required: true
        - name: since
          in: query
          type: string
          description: 'Restrict results to email activity events that occur after a specific time. Uses ISO 8601 time format:
            2015-10-21T15:41:36+00:00.'
  exposes:
  - type: rest
    namespace: marketing-email-rest
    port: 8080
    description: REST adapter for Mailchimp Marketing API  — Email. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/lists/{list-id}/surveys/{survey-id}/actions/create-email
      name: lists-list-id-surveys-survey-id-actions-create-email
      description: REST surface for lists-list_id-surveys-survey_id-actions-create-email.
      operations:
      - method: POST
        name: postlistsidsurveysidactionscreateemail
        description: Mailchimp Create a Survey Campaign
        call: marketing-email.postlistsidsurveysidactionscreateemail
        with:
          list_id: rest.list_id
          survey_id: rest.survey_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/reports/{campaign-id}/email-activity
      name: reports-campaign-id-email-activity
      description: REST surface for reports-campaign_id-email-activity.
      operations:
      - method: GET
        name: getreportsidemailactivity
        description: Mailchimp List Email Activity
        call: marketing-email.getreportsidemailactivity
        with:
          fields: rest.fields
          exclude_fields: rest.exclude_fields
          count: rest.count
          offset: rest.offset
          campaign_id: rest.campaign_id
          since: rest.since
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/reports/{campaign-id}/email-activity/{subscriber-hash}
      name: reports-campaign-id-email-activity-subscriber-hash
      description: REST surface for reports-campaign_id-email-activity-subscriber_hash.
      operations:
      - method: GET
        name: getreportsidemailactivityid
        description: Mailchimp Get Subscriber Email Activity
        call: marketing-email.getreportsidemailactivityid
        with:
          fields: rest.fields
          exclude_fields: rest.exclude_fields
          campaign_id: rest.campaign_id
          subscriber_hash: rest.subscriber_hash
          since: rest.since
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketing-email-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mailchimp Marketing API  — Email. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: mailchimp-create-survey-campaign
      description: Mailchimp Create a Survey Campaign
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketing-email.postlistsidsurveysidactionscreateemail
      with:
        list_id: tools.list_id
        survey_id: tools.survey_id
      outputParameters:
      - type: object
        mapping: $.
    - name: mailchimp-list-email-activity
      description: Mailchimp List Email Activity
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-email.getreportsidemailactivity
      with:
        fields: tools.fields
        exclude_fields: tools.exclude_fields
        count: tools.count
        offset: tools.offset
        campaign_id: tools.campaign_id
        since: tools.since
      outputParameters:
      - type: object
        mapping: $.
    - name: mailchimp-get-subscriber-email-activity
      description: Mailchimp Get Subscriber Email Activity
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketing-email.getreportsidemailactivityid
      with:
        fields: tools.fields
        exclude_fields: tools.exclude_fields
        campaign_id: tools.campaign_id
        subscriber_hash: tools.subscriber_hash
        since: tools.since
      outputParameters:
      - type: object
        mapping: $.
